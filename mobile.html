<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Starspoon — 연예인 맛집 큐레이터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=25b433faf5d746c938cbcc7658f650b0&libraries=services"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#F59E0B;--gold-bg:#FEF3C7;--gold-dark:#D97706;
  --white:#fff;--bg:#F8F7F4;--bg2:#F1EFE8;
  --text:#1A1A18;--text2:#4A4A47;--text3:#9A9A96;
  --border:#E8E6E0;--border2:#D4D3CF;
  --radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.12);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.18);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,'Pretendard',sans-serif;background:#fff}

/* ── 지도 전체화면 ── */
#map-container{position:fixed;inset:0;z-index:0}
#kakao-map{width:100%;height:100%}

/* ── 상단 바 ── */
#top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:12px 12px 0;
  pointer-events:none;
}

/* 검색창 */
#search-box{
  display:flex;align-items:center;gap:8px;
  background:#fff;border-radius:14px;
  padding:11px 14px;
  box-shadow:var(--shadow-lg);
  margin-bottom:10px;
  pointer-events:all;
}
#search-box i{font-size:18px;color:var(--text3);flex-shrink:0}
#search-placeholder{flex:1;font-size:15px;color:var(--text3);cursor:pointer}
#login-btn{
  background:none;border:1.5px solid var(--border2);
  border-radius:20px;padding:5px 12px;
  font-size:13px;color:var(--text2);cursor:pointer;
  white-space:nowrap;pointer-events:all;flex-shrink:0
}
#user-avatar-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--gold);display:flex;align-items:center;justify-content:center;
  font-size:15px;cursor:pointer;flex-shrink:0;overflow:hidden;
  border:2px solid var(--gold);pointer-events:all;
}
#user-avatar-btn img{width:100%;height:100%;object-fit:cover}

/* 큐레이터 스크롤 */
#curator-strip{
  display:flex;gap:8px;overflow-x:auto;
  scrollbar-width:none;padding:0 2px 10px;
  pointer-events:all;
}
#curator-strip::-webkit-scrollbar{display:none}
.c-pill{
  display:flex;align-items:center;gap:5px;
  background:#fff;border-radius:20px;
  padding:7px 14px;font-size:13px;font-weight:600;
  color:var(--text2);white-space:nowrap;flex-shrink:0;
  border:1.5px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,0.1);cursor:pointer;
  transition:all .15s;pointer-events:all;
}
.c-pill.on{background:var(--gold);color:#fff;border-color:var(--gold)}

/* ── 바텀시트 ── */
#bottom-sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:100;
  background:#fff;
  border-radius:20px 20px 0 0;
  box-shadow:0 -4px 20px rgba(0,0,0,0.15);
  transition:height .3s cubic-bezier(.4,0,.2,1);
  height:220px;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#sheet-handle{
  width:40px;height:4px;background:var(--border2);
  border-radius:2px;margin:10px auto 6px;flex-shrink:0;
}
#sheet-header{
  padding:0 16px 8px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
}
#sheet-title{font-size:14px;font-weight:700;color:var(--text)}
#sheet-count{font-size:12px;color:var(--text3)}
#sheet-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#sheet-list::-webkit-scrollbar{display:none}

/* 맛집 카드 */
.rest-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;background:#fff;transition:background .1s;
}
.rest-item:active{background:var(--bg)}
.rest-rank{
  width:26px;height:26px;border-radius:50%;
  background:var(--bg2);display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;
  color:var(--text3);flex-shrink:0;
}
.rest-rank.r1{background:var(--gold);color:#fff}
.rest-rank.r2{background:#C0C0C0;color:#fff}
.rest-rank.r3{background:#CD7F32;color:#fff}
.rest-info{flex:1;min-width:0}
.rest-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rest-sub{font-size:11px;color:var(--text3)}
.rest-rating{font-size:12px;color:var(--gold);font-weight:600;flex-shrink:0}

/* ── 맛집 상세 패널 ── */
#detail-panel{
  position:fixed;left:0;right:0;bottom:0;z-index:200;
  background:#fff;border-radius:20px 20px 0 0;
  box-shadow:0 -4px 20px rgba(0,0,0,0.2);
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  height:55vh;
  display:flex;flex-direction:column;overflow:hidden;
}
#detail-panel.open{transform:translateY(0)}
#detail-handle{
  width:40px;height:4px;background:var(--border2);
  border-radius:2px;margin:10px auto 6px;flex-shrink:0;cursor:grab;
}
#detail-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px;padding-bottom:40px;
}
#detail-body::-webkit-scrollbar{display:none}
.detail-name{font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px}
.detail-celeb{font-size:13px;color:var(--gold-dark);font-weight:600;margin-bottom:2px}
.detail-cat{font-size:12px;color:var(--text3);margin-bottom:12px}
.detail-comment{
  background:var(--gold-bg);border-left:3px solid var(--gold);
  border-radius:8px;padding:10px 12px;
  font-size:13px;color:var(--text2);font-style:italic;
  line-height:1.5;margin-bottom:14px;
}
.detail-addr{
  display:flex;align-items:flex-start;gap:8px;
  padding:10px 12px;background:var(--bg);border-radius:8px;
  font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.5;
}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.action-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:14px 8px;border-radius:12px;border:1.5px solid var(--border);
  background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);
}
.action-btn i{font-size:22px}
.action-btn.primary{background:var(--gold);border-color:var(--gold);color:#fff}
.action-btn.red{background:#FEE2E2;border-color:#FECACA;color:#991B1B}
.naver-btn{
  width:100%;padding:13px;border-radius:12px;
  background:#03C75A;border:none;color:#fff;
  font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:8px;
}
.detail-close{
  position:absolute;top:14px;right:16px;
  background:var(--bg2);border:none;border-radius:50%;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;color:var(--text2);
}

/* ── 검색 전체화면 ── */
#search-panel{
  position:fixed;inset:0;z-index:300;
  background:#fff;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
#search-panel.open{transform:translateY(0)}
#search-top{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
#search-back{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text);padding:4px}
#search-input-wrap{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--bg);border-radius:10px;padding:10px 12px;
}
#search-input{flex:1;border:none;outline:none;background:none;font-size:15px;color:var(--text)}
#search-input::placeholder{color:var(--text3)}
#search-clear{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;display:none;padding:0}
#search-body{flex:1;overflow-y:auto;padding:16px}
.search-section-title{font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;letter-spacing:0.3px}
.search-curator-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.search-curator-btn{
  padding:8px 14px;border-radius:20px;
  border:1.5px solid var(--border2);background:#fff;
  font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;
}
.search-curator-btn.on{background:var(--gold);border-color:var(--gold);color:#fff}
.search-region-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.search-region-btn{
  padding:10px 4px;border-radius:8px;border:1.5px solid var(--border);
  background:#fff;font-size:13px;color:var(--text2);cursor:pointer;text-align:center;
}
.search-region-btn.on{background:var(--gold-bg);border-color:var(--gold);color:var(--gold-dark);font-weight:700}
#search-footer{
  padding:14px 16px;background:#fff;border-top:1px solid var(--border);flex-shrink:0;
  padding-bottom:max(14px,env(safe-area-inset-bottom));
}
#search-submit{
  width:100%;padding:15px;background:var(--gold);
  border:none;border-radius:12px;color:#fff;
  font-size:16px;font-weight:700;cursor:pointer;
}

/* ── 로그인 모달 ── */
#login-modal{
  position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,0.5);
  display:none;align-items:center;justify-content:center;padding:20px;
}
#login-modal.open{display:flex}
.login-box{
  background:#fff;border-radius:20px;
  padding:28px 24px;width:100%;max-width:340px;position:relative;
}
.login-close{
  position:absolute;top:14px;right:16px;
  background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);
}
.login-google-btn{
  width:100%;padding:14px;background:#fff;
  border:1.5px solid var(--border);border-radius:12px;
  font-size:15px;font-weight:600;color:var(--text);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:10px;
}
.login-notice{
  font-size:11px;color:var(--text3);text-align:center;
  padding:8px 12px;background:var(--bg);border-radius:8px;line-height:1.6;
}

/* ── 토스트 ── */
#toast{
  position:fixed;bottom:240px;left:50%;transform:translateX(-50%);
  background:#1A1A18;color:#fff;padding:10px 18px;
  border-radius:20px;font-size:13px;z-index:500;
  display:none;white-space:nowrap;box-shadow:var(--shadow);
}
#toast.show{display:block}

/* 내 위치 버튼 */
#my-location-btn{
  position:fixed;right:14px;bottom:240px;z-index:101;
  width:42px;height:42px;border-radius:50%;
  background:#fff;border:none;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;color:var(--text2);
}

/* 유저 메뉴 */
#user-menu{
  position:fixed;top:70px;right:12px;z-index:200;
  background:#fff;border:1px solid var(--border);
  border-radius:14px;padding:14px;min-width:180px;
  box-shadow:var(--shadow-lg);display:none;
}
#user-menu.open{display:block}
</style>
</head>
<body>

<!-- 지도 -->
<div id="map-container">
  <div id="kakao-map"></div>
</div>

<!-- 상단 바 -->
<div id="top-bar">
  <!-- 검색창 -->
  <div id="search-box">
    <i class="ti ti-search"></i>
    <div id="search-placeholder" onclick="openSearch()">지역 / 큐레이터 / 식당이름</div>
    <div id="auth-area">
      <button id="login-btn" onclick="openLoginModal()">로그인</button>
    </div>
  </div>
  <!-- 큐레이터 -->
  <div id="curator-strip">
    <div class="c-pill on" data-name="" onclick="selectCurator(this,'')">🍽️ 전체</div>
  </div>
</div>

<!-- 내 위치 버튼 -->
<button id="my-location-btn" onclick="goMyLocation()">
  <i class="ti ti-current-location"></i>
</button>

<!-- 바텀시트 -->
<div id="bottom-sheet">
  <div id="sheet-handle"></div>
  <div id="sheet-header">
    <span id="sheet-title">주변 맛집</span>
    <span id="sheet-count"></span>
  </div>
  <div id="sheet-list"></div>
</div>

<!-- 맛집 상세 -->
<div id="detail-panel">
  <button class="detail-close" onclick="closeDetail()">✕</button>
  <div id="detail-handle"></div>
  <div id="detail-body"></div>
</div>

<!-- 검색 패널 -->
<div id="search-panel">
  <div id="search-top">
    <button id="search-back" onclick="closeSearch()"><i class="ti ti-arrow-left"></i></button>
    <div id="search-input-wrap">
      <i class="ti ti-search" style="color:var(--text3);font-size:16px;flex-shrink:0"></i>
      <input id="search-input" type="text" placeholder="지역 / 큐레이터 / 식당이름"
        oninput="onSearchInput(this.value)"
        onkeydown="if(event.key==='Enter')doSearch()">
      <button id="search-clear" onclick="clearSearchInput()">✕</button>
    </div>
  </div>
  <div id="search-body">
    <div class="search-section-title">🌟 큐레이터</div>
    <div class="search-curator-grid" id="search-curator-grid"></div>
    <div class="search-section-title">📍 지역</div>
    <div class="search-region-grid">
      <button class="search-region-btn" onclick="selectRegion(this,'서울')">서울</button>
      <button class="search-region-btn" onclick="selectRegion(this,'부산')">부산</button>
      <button class="search-region-btn" onclick="selectRegion(this,'대구')">대구</button>
      <button class="search-region-btn" onclick="selectRegion(this,'인천')">인천</button>
      <button class="search-region-btn" onclick="selectRegion(this,'광주')">광주</button>
      <button class="search-region-btn" onclick="selectRegion(this,'대전')">대전</button>
      <button class="search-region-btn" onclick="selectRegion(this,'울산')">울산</button>
      <button class="search-region-btn" onclick="selectRegion(this,'경기')">경기</button>
      <button class="search-region-btn" onclick="selectRegion(this,'강원')">강원</button>
      <button class="search-region-btn" onclick="selectRegion(this,'전라')">전라</button>
      <button class="search-region-btn" onclick="selectRegion(this,'경상')">경상</button>
      <button class="search-region-btn" onclick="selectRegion(this,'제주')">제주</button>
    </div>
  </div>
  <div id="search-footer">
    <button id="search-submit" onclick="doSearch()">🔍 검색하기</button>
  </div>
</div>

<!-- 로그인 모달 -->
<div id="login-modal">
  <div class="login-box">
    <button class="login-close" onclick="closeLoginModal()">✕</button>
    <div style="text-align:center;margin-bottom:22px">
      <div style="font-size:36px;margin-bottom:8px">🥄</div>
      <div style="font-size:18px;font-weight:800;color:var(--text);margin-bottom:4px">스타스푼 로그인</div>
      <div style="font-size:13px;color:var(--text3)">맛집 저장·댓글·등록이 가능해요</div>
    </div>
    <button onclick="loginWithKakao()" style="width:100%;padding:14px;background:#FEE500;border:none;border-radius:12px;font-size:15px;font-weight:700;color:#3A1D1D;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path fill="#3A1D1D" d="M9 1.5C4.86 1.5 1.5 4.14 1.5 7.41c0 2.1 1.38 3.93 3.45 4.98L4.2 15l3.27-2.16c.48.06.99.09 1.53.09 4.14 0 7.5-2.64 7.5-5.91S13.14 1.5 9 1.5z"/></svg>
      카카오로 시작하기
    </button>
    <button class="login-google-btn" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      구글로 시작하기
    </button>
    <div class="login-notice">
      구글 로그인은 Safari 또는 Chrome에서만 가능해요
    </div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where, orderBy, limit, doc, getDoc, updateDoc, addDoc, increment } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC5nf84GbQQ_5vIDwhIvTZ5zPqf7nrnSxU",
  authDomain: "starspoon-120d7.firebaseapp.com",
  projectId: "starspoon-120d7",
  appId: "1:672370227821:web:aea1d9c6ca8587842a5d64"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();

// ── 상태 ──
let currentUser = null;
let DATA = []; // 현재 표시 중인 맛집
let ALL_DATA = []; // 전체 로드된 맛집
let STAR_CURATORS = [];
let selCurator = '';
let selRegion = '';
let searchText = '';
let savedList = [];
let currentRest = null;
let map, markers = [], markerMap = {};
let myLat = 37.5665, myLng = 126.9780;

// ── 지도 초기화 ──
function initMap(lat, lng) {
  const container = document.getElementById('kakao-map');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(lat, lng),
    level: 5
  });
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
  loadNearbyRests(lat, lng);
}

// 내 위치 가져오기
function getMyLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        myLat = pos.coords.latitude;
        myLng = pos.coords.longitude;
        initMap(myLat, myLng);
      },
      () => initMap(37.5665, 126.9780) // 실패시 서울 중심
    );
  } else {
    initMap(37.5665, 126.9780);
  }
}

window.goMyLocation = function() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      if (map) {
        map.setCenter(new kakao.maps.LatLng(lat, lng));
        map.setLevel(5);
      }
    });
  }
};

// ── 데이터 로드 ──
async function loadCurators() {
  try {
    const snap = await getDocs(collection(db, 'curators'));
    STAR_CURATORS = [];
    snap.forEach(d => {
      const data = d.data();
      if (data.name) STAR_CURATORS.push({id: d.id, ...data});
    });
    STAR_CURATORS.sort((a,b) => (a.order||99)-(b.order||99));
    renderCuratorStrip();
    renderSearchCurators();
  } catch(e) { console.log(e); }
}

function renderCuratorStrip() {
  const strip = document.getElementById('curator-strip');

// 주변 맛집 로드
async function loadNearbyRests(lat, lng) {
  try {
    document.getElementById('sheet-title').textContent = '맛집 로딩 중...';
    const snap = await getDocs(query(collection(db, 'restaurants'), limit(500)));
    ALL_DATA = [];
    snap.forEach(d => {
      const r = d.data();
      ALL_DATA.push({
        id: d.id, name: r.name||'', celeb: r.celeb||'',
        celebs: r.celebs||[r.celeb||''], cat: r.category||r.cat||'한식',
        area: r.area||'', address: r.address||'', comment: r.comment||'',
        yt: r.yt||r.video_url||'',
        lat: r.lat||37.5665, lng: r.lng||126.9780,
        saves: r.saves||0, avgRating: r.avgRating||0,
        ratingCount: r.ratingCount||0, visits: r.visits||0,
      });
    });
    // 거리 계산 후 정렬
    ALL_DATA.forEach(r => {
      const dlat = r.lat - lat, dlng = r.lng - lng;
      r.dist = Math.sqrt(dlat*dlat + dlng*dlng);
    });
    applyFilter();
  } catch(e) {
    console.log(e);
    document.getElementById('sheet-title').textContent = '로드 실패';
  }
}

// 필터 적용
function applyFilter() {
  let items = [...ALL_DATA];
  if (selCurator) {
    items = items.filter(r => r.celeb === selCurator || (r.celebs||[]).includes(selCurator));
  }
  if (selRegion) {
    items = items.filter(r => (r.area||'').includes(selRegion) || (r.address||'').includes(selRegion));
  }
  if (searchText) {
    const q = searchText;
    items = items.filter(r => r.name.includes(q)||r.celeb.includes(q)||r.area.includes(q)||r.comment.includes(q));
  }
  // 정렬: 큐레이터/지역/검색 없으면 거리순, 있으면 평점순
  if (!selCurator && !selRegion && !searchText) {
    // 거리순 (현재 위치 기반)
    items.sort((a,b) => (a.dist||999)-(b.dist||999));
  } else {
    // 평점순
    items.sort((a,b) => (b.avgRating||0)-(a.avgRating||0));
  }
  DATA = items;
  renderList();
  renderPins();
  const label = selCurator ? selCurator + ' 맛집' : selRegion ? selRegion + ' 맛집' : searchText ? `"${searchText}" 검색결과` : '내 주변 맛집';
  document.getElementById('sheet-title').textContent = label;
  document.getElementById('sheet-count').textContent = items.length + '곳';
}

// 리스트 렌더링
function renderList() {
  const list = document.getElementById('sheet-list');
  if (!DATA.length) {
    list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3);font-size:14px">맛집이 없어요</div>';
    return;
  }
  list.innerHTML = DATA.map((r,i) => {
    const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'';
    return `<div class="rest-item" onclick="openDetail('${r.id}')">
      <div class="rest-rank ${rankClass}">${i+1}</div>
      <div class="rest-info">
        <div class="rest-name">${r.name}</div>
        <div class="rest-sub">${r.celeb} · ${r.cat} · ${r.area}</div>
      </div>
      <div class="rest-rating">${r.avgRating ? '★ '+r.avgRating.toFixed(1) : ''}</div>
    </div>`;
  }).join('');
}

// 핀 렌더링
function renderPins() {
  markers.forEach(m => m.setMap(null));
  markers = []; markerMap = {};
  DATA.forEach(r => {
    const pos = new kakao.maps.LatLng(r.lat, r.lng);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="38" viewBox="0 0 36 42"><path d="M18 0C8 0 0 8 0 18c0 12 18 24 18 24S36 30 36 18C36 8 28 0 18 0z" fill="#F59E0B"/><text x="18" y="24" text-anchor="middle" font-size="14">⭐</text></svg>`;
    const img = new kakao.maps.MarkerImage(
      'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg),
      new kakao.maps.Size(32,38), {offset: new kakao.maps.Point(16,38)}
    );
    const marker = new kakao.maps.Marker({map, position:pos, image:img, title:r.name});
    kakao.maps.event.addListener(marker, 'click', () => openDetail(r.id));
    markers.push(marker);
    markerMap[r.id] = marker;
  });
}

    map.setLevel(4);
  }
  updateDoc(doc(db,'restaurants',id), {visits: increment(1)}).catch(()=>{});

window.closeDetail = function() {
  const panel = document.getElementById('detail-panel');
  panel.classList.remove('open');
  panel.style.height = '55vh';
};

// 상세 패널 드래그
const detailPanel = document.getElementById('detail-panel');
const detailHandle = document.getElementById('detail-handle');
const detailBody = document.getElementById('detail-body');
let detailDragging = false, detailStartY = 0, detailStartH = 0, detailVelocity = 0, detailLastY = 0;

detailPanel.addEventListener('touchstart', e => {
  const isBody = detailBody.contains(e.target);
  const atTop = detailBody.scrollTop === 0;
  if (isBody && !atTop) return; // 스크롤 중이면 드래그 안 함
  detailDragging = true;
  detailStartY = e.touches[0].clientY;
  detailLastY = detailStartY;
  detailStartH = detailPanel.getBoundingClientRect().height;
  detailVelocity = 0;
  detailPanel.style.transition = 'none';
}, {passive:true});

document.addEventListener('touchmove', e => {
  if (!detailDragging) return;
  const y = e.touches[0].clientY;
  detailVelocity = detailLastY - y;
  detailLastY = y;
  const dy = detailStartY - y;
  const newH = Math.max(120, Math.min(detailStartH + dy, window.innerHeight * 0.55));
  detailPanel.style.height = newH + 'px';
}, {passive:true});

document.addEventListener('touchend', () => {
  if (!detailDragging) return;
  detailDragging = false;
  detailPanel.style.transition = 'height .25s cubic-bezier(.4,0,.2,1)';
  const h = detailPanel.getBoundingClientRect().height;
  if (detailVelocity < -8 || h < 200) {
    // 빠르게 내리거나 충분히 내리면 닫기
    closeDetail();
  } else if (detailVelocity > 8) {
    // 빠르게 올리면 최대
    detailPanel.style.height = (window.innerHeight * 0.55) + 'px';
  } else if (h < window.innerHeight * 0.4) {
    detailPanel.style.height = '55vh';
  } else {
    detailPanel.style.height = (window.innerHeight * 0.55) + 'px';
  }
});

window.openKakaoMap = function() {
  if (!currentRest) return;
  const name = encodeURIComponent(currentRest.name);
  const lat = currentRest.lat;
  const lng = currentRest.lng;
  // 카카오맵 앱 설치된 경우 앱으로, 아니면 웹으로
  const appUrl = `kakaomap://look?p=${lat},${lng}`;
  const webUrl = `https://map.kakao.com/link/map/${encodeURIComponent(currentRest.name)},${lat},${lng}`;
  // 앱 시도 후 실패하면 웹으로 폴백
  const appLink = document.createElement('a');
  appLink.href = appUrl;
  appLink.click();
  setTimeout(() => window.open(webUrl, '_blank'), 1500);
};
window.openNaverMap = function() {
  if (!currentRest) return;
  const query = currentRest.address
    ? currentRest.name + ' ' + currentRest.address.split(' ').slice(0,3).join(' ')
    : currentRest.name + ' ' + currentRest.area;
  window.open(`https://map.naver.com/v5/search/${encodeURIComponent(query)}`, '_blank');
};
window.openYoutube = function() {
  if (!currentRest) return;
  if (currentRest.yt) window.open(currentRest.yt, '_blank');
  else window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(currentRest.celeb+' '+currentRest.name)}`, '_blank');
};
window.toggleSave = async function(id) {
  if (!currentUser) { showToast('로그인 후 저장할 수 있어요!'); return; }
  const idx = savedList.indexOf(id);
  if (idx >= 0) savedList.splice(idx,1);
  else savedList.push(id);
  await updateDoc(doc(db,'restaurants',id), {saves: increment(idx>=0?-1:1)});
  openDetail(id);
};

// ── 큐레이터 선택 ──
window.selectCurator = function(el, name) {
  selCurator = name;
  document.querySelectorAll('.c-pill').forEach(p => p.classList.remove('on'));

let searchSelRegion = '';

window.openSearch = function() {
  document.getElementById('search-panel').classList.add('open');
  setTimeout(() => document.getElementById('search-input').focus(), 300);
};
window.closeSearch = function() {
  document.getElementById('search-panel').classList.remove('open');
};

};

  document.getElementById('search-clear').style.display = 'none';

  searchSelCurator = name;
  document.querySelectorAll('.search-curator-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
};
window.selectRegion = function(el, region) {
  if (searchSelRegion === region) {
    searchSelRegion = '';
    el.classList.remove('on');
  } else {
    searchSelRegion = region;
    document.querySelectorAll('.search-region-btn').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
  }

window.doSearch = function() {
  const text = document.getElementById('search-input').value.trim();
  searchText = text;
  selCurator = searchSelCurator;
  selRegion = searchSelRegion;
  // 큐레이터 스트립 동기화
  document.querySelectorAll('.c-pill').forEach(p => {
    p.classList.toggle('on', p.dataset.name === selCurator);
  });
  closeSearch();
  applyFilter();
  // 지역 있으면 지도 이동
  if (selRegion && map) {
    const gc = new kakao.maps.services.Geocoder();
    gc.addressSearch(selRegion, (res, status) => {
      if (status === kakao.maps.services.Status.OK) {
        map.setCenter(new kakao.maps.LatLng(res[0].y, res[0].x));
        map.setLevel(8);
      }
    });
  } else if (DATA.length > 0 && map) {
    map.setCenter(new kakao.maps.LatLng(DATA[0].lat, DATA[0].lng));
    map.setLevel(8);
  }
};

// ── 바텀시트 드래그 (카카오맵 스타일) ──
const sheet = document.getElementById('bottom-sheet');
const sheetList = document.getElementById('sheet-list');
const SNAP_SMALL = 100;   // 최소 (핸들만)
const SNAP_MID = 240;     // 기본
const SNAP_LARGE = () => Math.floor(window.innerHeight * 0.75); // 최대

let isDragging = false;
let dragStartY = 0;
let dragStartH = 0;
let lastTouchY = 0;
let touchVelocity = 0;

function snapSheet(h) {
  sheet.style.transition = 'height .25s cubic-bezier(.4,0,.2,1)';
  const large = SNAP_LARGE();
  if (h < (SNAP_SMALL + SNAP_MID) / 2) sheet.style.height = SNAP_SMALL + 'px';
  else if (h < (SNAP_MID + large) / 2) sheet.style.height = SNAP_MID + 'px';
  else sheet.style.height = large + 'px';
}

// 핸들 드래그
sheet.addEventListener('touchstart', e => {
  const target = e.target;
  // 리스트 영역 터치이고 시트가 최대 크기면 → 스크롤 허용
  const isListArea = sheetList.contains(target);
  const isLarge = sheet.getBoundingClientRect().height >= SNAP_LARGE() - 10;
  if (isListArea && isLarge && sheetList.scrollTop > 0) return;

  isDragging = true;
  dragStartY = e.touches[0].clientY;
  dragStartH = sheet.getBoundingClientRect().height;
  lastTouchY = dragStartY;
  touchVelocity = 0;
  sheet.style.transition = 'none';
}, {passive:true});

document.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const y = e.touches[0].clientY;
  touchVelocity = lastTouchY - y;
  lastTouchY = y;
  const dy = dragStartY - y;
  const newH = Math.max(SNAP_SMALL, Math.min(dragStartH + dy, SNAP_LARGE()));
  sheet.style.height = newH + 'px';
}, {passive:true});

document.addEventListener('touchend', () => {
  if (!isDragging) return;
  isDragging = false;
  const h = sheet.getBoundingClientRect().height;
  // 빠르게 위로 스와이프하면 최대
  if (touchVelocity > 8) {
    sheet.style.transition = 'height .25s cubic-bezier(.4,0,.2,1)';
    sheet.style.height = SNAP_LARGE() + 'px';
  // 빠르게 아래로 스와이프하면 최소
  } else if (touchVelocity < -8) {
    sheet.style.transition = 'height .25s cubic-bezier(.4,0,.2,1)';
    sheet.style.height = SNAP_SMALL + 'px';
  } else {
    snapSheet(h);
  }
});

// 리스트 최상단에서 아래로 당기면 시트 축소
sheetList.addEventListener('touchstart', e => {
  if (sheetList.scrollTop === 0) {
    isDragging = true;
    dragStartY = e.touches[0].clientY;
    dragStartH = sheet.getBoundingClientRect().height;
    lastTouchY = dragStartY;
    touchVelocity = 0;
    sheet.style.transition = 'none';
  }
}, {passive:true});

// 카카오 로그인 콜백 처리
async function handleKakaoCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (!code) return;
  window.history.replaceState({}, '', window.location.pathname);
  try {
    showToast('카카오 로그인 중...');
    const res = await fetch('/api/kakao-token', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code, redirectUri: window.location.origin + '/mobile.html'})
    });
    const tokenData = await res.json();
    if (!tokenData.access_token) { showToast('카카오 로그인 실패'); return; }
    window.Kakao.init('25b433faf5d746c938cbcc7658f650b0');
    window.Kakao.Auth.setAccessToken(tokenData.access_token);
    const userRes = await window.Kakao.API.request({url: '/v2/user/me'});
    const kakaoUid = 'kakao_' + userRes.id;
    const displayName = userRes.kakao_account?.profile?.nickname 
      || userRes.properties?.nickname || '카카오사용자';
    const photoURL = userRes.kakao_account?.profile?.profile_image_url 
      || userRes.properties?.profile_image || '';
    const { setDoc, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js");
    const userRef = doc(db, 'users', kakaoUid);
    const snap = await getDoc(userRef);
    if (!snap.exists()) {
      await setDoc(userRef, {
        displayName, photoURL, provider: 'kakao',
        points: 20, saved: [], registeredRests: [],
        createdAt: new Date().toISOString()
      });
      showToast('카카오 로그인 성공! 🎉 +20pt');
    } else {
      showToast('카카오 로그인 성공! 환영해요 😊');
    }
    currentUser = {uid: kakaoUid, displayName, photoURL};
    savedList = snap.data()?.saved || [];
    const area = document.getElementById('auth-area');
    area.innerHTML = `<div id="user-avatar-btn" onclick="toggleUserMenu()">
      ${photoURL ? `<img src="${photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : '🥄'}
    </div>`;
    closeLoginModal();
  } catch(e) { showToast('카카오 로그인 오류: ' + e.message); }
}

        email: result.user.email||'',

        createdAt: new Date().toISOString()
      });
      showToast('환영해요! 🎉 가입 보너스 20pt!');
    }
  }
}).catch(()=>{});

  currentUser = user;
  if (user) {
    const snap = await getDoc(doc(db,'users',user.uid));
    savedList = snap.data()?.saved || [];
    const area = document.getElementById('auth-area');
    const photo = user.photoURL;

    closeLoginModal();
  } else {
    savedList = [];
    document.getElementById('auth-area').innerHTML = `<button id="login-btn" onclick="openLoginModal()">로그인</button>`;
  }
});

window.toggleUserMenu = function() {
  const menu = document.getElementById('user-menu');
  if (!menu) {
    const m = document.createElement('div');
    m.id = 'user-menu';
    m.className = 'open';
    m.innerHTML = `
      <div style="font-size:14px;font-weight:700;margin-bottom:8px">${currentUser?.displayName||'사용자'}</div>
      <button onclick="signOut(auth);document.getElementById('user-menu').remove()" 
        style="background:none;border:1px solid var(--border2);border-radius:8px;padding:7px 14px;font-size:13px;color:var(--text3);cursor:pointer;width:100%">로그아웃</button>
    `;
    document.body.appendChild(m);
    setTimeout(() => document.addEventListener('click', function h(e) {
      if (!m.contains(e.target) && e.target.id !== 'user-avatar-btn') {
        m.remove(); document.removeEventListener('click', h);
      }
    }), 100);
  } else {
    menu.remove();
  }
};

}
