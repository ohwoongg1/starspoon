<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Starspoon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=25b433faf5d746c938cbcc7658f650b0&libraries=services"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#F59E0B;--gold-bg:#FEF3C7;--gold-dark:#D97706;
  --white:#fff;--bg:#F8F7F4;--bg2:#F1EFE8;
  --text:#1A1A18;--text2:#4A4A47;--text3:#9A9A96;
  --border:#E8E6E0;--border2:#D4D3CF;
  --radius:12px;--radius-sm:8px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Pretendard',sans-serif;background:var(--white);color:var(--text)}

/* ── 화면 전환 컨테이너 ── */
#app{width:100%;height:100%;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--white);transition:transform .3s cubic-bezier(.4,0,.2,1);will-change:transform}
.screen.hidden-right{transform:translateX(100%)}
.screen.hidden-left{transform:translateX(-30%)}
.screen.active{transform:translateX(0)}

/* ── 공통 헤더 ── */
.s-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--white);flex-shrink:0;min-height:52px}
.s-back{background:none;border:none;padding:4px;cursor:pointer;color:var(--text);font-size:22px;line-height:1;flex-shrink:0}
.s-title{flex:1;font-size:16px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-home{background:none;border:none;padding:4px;cursor:pointer;color:var(--gold);font-size:20px;line-height:1;flex-shrink:0}

/* ── 화면1: 홈 ── */
#screen-home .logo-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px}
#screen-home .logo{display:flex;align-items:center;gap:8px}
#screen-home .logo-icon{width:36px;height:36px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
#screen-home .logo-text{font-size:20px;font-weight:800;color:var(--text)}
#screen-home .logo-text span{color:var(--gold)}
.auth-btn{background:none;border:1px solid var(--border2);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--text2);cursor:pointer}

/* 검색창 */
.home-search{margin:0 16px 16px;position:relative}
.home-search-box{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:var(--radius);padding:13px 16px;border:2px solid var(--border)}
.home-search-box input{flex:1;border:none;outline:none;background:none;font-size:15px;color:var(--text)}
.home-search-box input::placeholder{color:var(--text3)}
.home-search-btn{background:var(--gold);border:none;border-radius:var(--radius-sm);padding:8px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}

/* 섹션 */
.home-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home-section{padding:16px 16px 8px}
.home-section-title{font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;letter-spacing:0.5px}

/* 큐레이터 그리드 */
.curator-grid{display:flex;flex-wrap:wrap;gap:8px}
.curator-pill{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s}
.curator-pill.on{background:var(--gold);border-color:var(--gold);color:#fff}

/* 카테고리 그리드 */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.cat-btn{padding:10px 4px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--white);font-size:12px;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s}
.cat-btn.on{background:var(--gold-bg);border-color:var(--gold);color:var(--gold-dark);font-weight:700}

/* 지역 그리드 */
.region-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.region-btn{padding:10px 4px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--white);font-size:13px;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s}
.region-btn.on{background:var(--gold-bg);border-color:var(--gold);color:var(--gold-dark);font-weight:700}

/* 최근 검색 */
.recent-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.recent-item:last-child{border-bottom:none}
.recent-del{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;line-height:1;margin-left:auto}

/* 검색하기 버튼 */
.home-footer{padding:12px 16px;background:var(--white);border-top:1px solid var(--border);flex-shrink:0}
.search-submit{width:100%;background:var(--gold);border:none;border-radius:var(--radius);padding:15px;font-size:16px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.search-info{font-size:12px;color:var(--text3);text-align:center;margin-bottom:8px}

/* ── 화면2: 리스트 ── */
#screen-list .list-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.list-count-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.list-count-txt{font-size:13px;color:var(--text2)}
.sort-select{border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:12px;background:var(--white);color:var(--text2)}

/* 맛집 카드 */
.rest-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;active:background:var(--bg2)}
.rest-item:active{background:var(--bg2)}
.rest-num{width:28px;height:28px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text3);flex-shrink:0}
.rest-num.n1{background:var(--gold);color:#fff}
.rest-num.n2{background:#C0C0C0;color:#fff}
.rest-num.n3{background:#CD7F32;color:#fff}
.rest-info{flex:1;min-width:0}
.rest-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rest-celeb{font-size:11px;color:var(--gold-dark);font-weight:600;margin-bottom:2px}
.rest-meta{font-size:12px;color:var(--text3)}
.rest-arrow{color:var(--border2);font-size:18px;flex-shrink:0}
.rest-rating{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text3)}
.rest-saves{font-size:11px;color:var(--text3)}

/* 빈 결과 */
.empty-result{padding:60px 20px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-txt{font-size:15px;color:var(--text2);font-weight:500;margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--text3)}

/* ── 화면3: 가게 상세 ── */
#screen-detail .detail-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.map-container{width:100%;height:220px;background:var(--bg2);flex-shrink:0;position:relative}
#detail-map{width:100%;height:100%}
.detail-info{padding:16px}
.detail-name{font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px}
.detail-celeb{font-size:13px;color:var(--gold-dark);font-weight:600;margin-bottom:4px}
.detail-cat{font-size:13px;color:var(--text3);margin-bottom:12px}
.detail-addr{display:flex;align-items:flex-start;gap:8px;padding:12px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:12px}
.detail-addr-text{font-size:13px;color:var(--text2);line-height:1.5}
.detail-phone{display:flex;align-items:center;gap:8px;padding:12px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:16px}
.detail-phone a{font-size:13px;color:var(--gold-dark);font-weight:600;text-decoration:none}
.detail-comment{padding:12px;background:var(--gold-bg);border-radius:var(--radius-sm);border-left:3px solid var(--gold);font-size:13px;color:var(--text2);font-style:italic;margin-bottom:16px;line-height:1.5}

/* 액션 버튼 */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.action-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all .15s}
.action-btn:active{background:var(--bg2)}
.action-btn i{font-size:22px}
.action-btn.primary{background:var(--gold);border-color:var(--gold);color:#fff}
.action-btn.red{background:#FEE2E2;border-color:#FECACA;color:#991B1B}
.action-btn.saved{background:var(--gold-bg);border-color:var(--gold);color:var(--gold-dark)}

/* 네이버 지도 버튼 */
.naver-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:var(--radius);background:#03C75A;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px}

/* 댓글 섹션 */
.comment-section{margin-top:8px;border-top:1px solid var(--border);padding-top:16px}
.comment-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px}
.comment-item{padding:10px 0;border-bottom:1px solid var(--border)}
.comment-user{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.comment-stars{color:var(--gold);font-size:11px;margin-bottom:3px}
.comment-text{font-size:13px;color:var(--text2);line-height:1.4}
.comment-form{margin-top:12px}
.comment-input{width:100%;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;resize:none;color:var(--text);background:var(--white)}
.comment-submit{margin-top:6px;background:var(--text);color:#fff;border:none;border-radius:var(--radius-sm);padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;float:right}

/* ── 로딩 ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px}
.loading-spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--text3)}

/* ── 토스트 ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,0.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 별점 */
.star-row{display:flex;gap:4px;margin:8px 0}
.star-btn{font-size:24px;cursor:pointer;color:var(--border2);transition:color .1s;background:none;border:none;padding:0}
.star-btn.on{color:var(--gold)}
</style>
</head>
<body>

<div id="app">

<!-- ══ 화면1: 홈 ══ -->
<div class="screen active" id="screen-home">
  <div class="logo-bar">
    <div class="logo">
      <div class="logo-icon">🥄</div>
      <div class="logo-text">Star<span>spoon</span></div>
    </div>
    <div id="authArea"></div>
  </div>

  <div class="home-search">
    <div class="home-search-box">
      <i class="ti ti-search" style="color:var(--text3);font-size:18px;flex-shrink:0"></i>
      <input type="text" id="textSearch" placeholder="맛집 이름으로 검색">
    </div>
  </div>

  <div class="home-body">
    <!-- 큐레이터 -->
    <div class="home-section">
      <div class="home-section-title">🌟 큐레이터 선택</div>
      <div class="curator-grid" id="curatorGrid">
        <div class="curator-pill on" data-curator="" onclick="toggleCurator(this,'')">🍽️ 전체</div>
      </div>
    </div>

    <!-- 카테고리 -->
    <div class="home-section">
      <div class="home-section-title">🍽️ 음식 카테고리</div>
      <div class="cat-grid">
        <button class="cat-btn on" onclick="setCat(this,'전체')">전체</button>
        <button class="cat-btn" onclick="setCat(this,'한식')">🍚 한식</button>
        <button class="cat-btn" onclick="setCat(this,'국밥·탕')">🍲 국밥</button>
        <button class="cat-btn" onclick="setCat(this,'고기')">🥩 고기</button>
        <button class="cat-btn" onclick="setCat(this,'냉면')">🍜 냉면</button>
        <button class="cat-btn" onclick="setCat(this,'중식')">🥡 중식</button>
        <button class="cat-btn" onclick="setCat(this,'일식')">🍣 일식</button>
        <button class="cat-btn" onclick="setCat(this,'분식')">🍢 분식</button>
        <button class="cat-btn" onclick="setCat(this,'해산물')">🦞 해산물</button>
        <button class="cat-btn" onclick="setCat(this,'양식')">🍝 양식</button>
        <button class="cat-btn" onclick="setCat(this,'제과·빵')">🥐 빵</button>
        <button class="cat-btn" onclick="setCat(this,'카페·디저트')">☕ 카페</button>
      </div>
    </div>

    <!-- 지역 -->
    <div class="home-section">
      <div class="home-section-title">📍 지역 선택 (선택안하면 전국)</div>
      <div class="region-grid">
        <button class="region-btn" onclick="toggleRegion(this,'서울')">서울</button>
        <button class="region-btn" onclick="toggleRegion(this,'부산')">부산</button>
        <button class="region-btn" onclick="toggleRegion(this,'대구')">대구</button>
        <button class="region-btn" onclick="toggleRegion(this,'인천')">인천</button>
        <button class="region-btn" onclick="toggleRegion(this,'광주')">광주</button>
        <button class="region-btn" onclick="toggleRegion(this,'대전')">대전</button>
        <button class="region-btn" onclick="toggleRegion(this,'울산')">울산</button>
        <button class="region-btn" onclick="toggleRegion(this,'경기')">경기</button>
        <button class="region-btn" onclick="toggleRegion(this,'강원')">강원</button>
        <button class="region-btn" onclick="toggleRegion(this,'전라')">전라</button>
        <button class="region-btn" onclick="toggleRegion(this,'경상')">경상</button>
        <button class="region-btn" onclick="toggleRegion(this,'제주')">제주</button>
      </div>
    </div>

    <!-- 최근 검색 -->
    <div class="home-section" id="recentSection">
      <div class="home-section-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>🕐 최근 검색</span>
        <button onclick="clearRecent()" style="background:none;border:none;font-size:12px;color:var(--text3);cursor:pointer">전체 삭제</button>
      </div>
      <div id="recentList"></div>
    </div>
    <div style="height:80px"></div>
  </div>

  <div class="home-footer">
    <div class="search-info" id="searchInfo">성시경 · 전체 카테고리 · 전국</div>
    <button class="search-submit" onclick="doMobileSearch()">
      <i class="ti ti-search"></i> 검색하기
    </button>
  </div>
</div>

<!-- ══ 화면2: 리스트 ══ -->
<div class="screen hidden-right" id="screen-list">
  <div class="s-header">
    <button class="s-back" onclick="goBack()" aria-label="뒤로가기"><i class="ti ti-arrow-left"></i></button>
    <span class="s-title" id="listScreenTitle">맛집 목록</span>
    <button class="s-home" onclick="goHome()" aria-label="홈으로"><i class="ti ti-home"></i></button>
  </div>
  <div class="list-count-bar">
    <span class="list-count-txt" id="listCountTxt">검색 중...</span>
    <select class="sort-select" onchange="setSort(this.value)">
      <option value="rating">평점순</option>
      <option value="saves">저장순</option>
      <option value="recent">최신순</option>
    </select>
  </div>
  <div class="list-body" id="listBody">
    <div class="loading"><div class="loading-spin"></div><div class="loading-txt">불러오는 중...</div></div>
  </div>
</div>

<!-- ══ 화면3: 가게 상세 ══ -->
<div class="screen hidden-right" id="screen-detail">
  <div class="s-header">
    <button class="s-back" onclick="goBack()" aria-label="뒤로가기"><i class="ti ti-arrow-left"></i></button>
    <span class="s-title" id="detailTitle">가게 상세</span>
    <button class="s-home" onclick="goHome()" aria-label="홈으로"><i class="ti ti-home"></i></button>
  </div>
  <div class="detail-body" id="detailBody">
    <div class="map-container"><div id="detail-map"></div></div>
    <div class="detail-info" id="detailInfo"></div>
  </div>
</div>

</div>

<div id="toast"></div>

<script type="module">

  '경기':['경기','수원','성남','고양','용인','부천','안산','화성','남양주','안양','평택','시흥','파주','의정부','김포','광명','하남','군포','오산','이천','안성'],
  '강원':['강원','춘천','원주','강릉','동해','속초','삼척'],
  '전라':['전라','전북','전남','광양','순천','여수','목포','나주','전주','군산','익산'],
  '경상':['경상','경북','경남','포항','경주','구미','안동','창원','진주','통영','김해','거제','양산'],
  '충청':['충청','충북','충남','청주','충주','천안','공주','아산','서산','논산'],
  '제주':['제주','서귀포'],
};
function matchRegion(r, region) {
  if (!region) return true;
  const area = r.area || '';
  const addr = r.address || '';
  const combined = area + ' ' + addr;
  const keywords = REGION_MAP[region] || [region];
  return keywords.some(k => combined.includes(k));
}

// ── 인증 ──

}).catch(()=>{});

function renderAuthArea() {

// ── 큐레이터 로드 ──
async function loadCurators() {
  try {
    const snap = await getDocs(query(collection(db, 'curators'), orderBy('order')));
    STAR_CURATORS = [];
    snap.forEach(d => { if (d.data().type === 'star') STAR_CURATORS.push({id:d.id, ...d.data()}); });
    if (!STAR_CURATORS.length) {
      STAR_CURATORS = [
        {name:'성시경',icon:'🎵'},{name:'풍자',icon:'😄'},{name:'이영자',icon:'👩'},{name:'백종원',icon:'👨‍🍳'},
        {name:'히밥',icon:'🍱'},{name:'입짧은햇님',icon:'🌸'},{name:'김사원세끼',icon:'🍺'},
        {name:'백년가게',icon:'🏛️'},{name:'정육왕',icon:'🥩'},{name:'투스타',icon:'⭐⭐'},
        {name:'숨은 로컬 맛집',icon:'📍'}
      ];
    }
    renderCuratorGrid();
  } catch(e) { console.log(e); }
}

function renderCuratorGrid() {
  const grid = document.getElementById('curatorGrid');
  grid.innerHTML = `<div class="curator-pill on" data-curator="" onclick="toggleCurator(this,'')">🍽️ 전체</div>` +
    STAR_CURATORS.map(c => `<div class="curator-pill" data-curator="${c.name}" onclick="toggleCurator(this,'${c.name}')">${c.icon} ${c.name}</div>`).join('');
}

window.toggleCurator = function(el, name) {
  selCurator = name;
  document.querySelectorAll('.curator-pill').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  updateSearchInfo();
};

window.setCat = function(el, cat) {
  selCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  updateSearchInfo();
};

window.toggleRegion = function(el, region) {
  if (selRegion === region) {
    selRegion = '';
    el.classList.remove('on');
  } else {
    selRegion = region;
    document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
  }
  updateSearchInfo();
};

function updateSearchInfo() {
  const parts = [];
  parts.push(selCurator || '전체 큐레이터');
  if (selCat !== '전체') parts.push(selCat);
  parts.push(selRegion || '전국');
  document.getElementById('searchInfo').textContent = parts.join(' · ');
}

// ── 최근 검색 ──
function saveRecent(label) {
  recentSearches = [label, ...recentSearches.filter(r => r !== label)].slice(0, 8);
  localStorage.setItem('ss_recent', JSON.stringify(recentSearches));
  renderRecent();
}
function renderRecent() {
  const el = document.getElementById('recentList');
  if (!recentSearches.length) { el.innerHTML = '<div style="padding:12px 0;font-size:13px;color:var(--text3)">최근 검색어가 없어요</div>'; return; }
  el.innerHTML = recentSearches.map((r,i) => `
    <div class="recent-item" onclick="applyRecent('${r.replace(/'/g,"\\'")}')">
      <i class="ti ti-clock" style="font-size:16px;color:var(--text3)"></i>
      <span style="flex:1;font-size:14px;color:var(--text)">${r}</span>
      <button class="recent-del" onclick="event.stopPropagation();deleteRecent(${i})">×</button>
    </div>`).join('');
}
window.clearRecent = function() { recentSearches = []; localStorage.setItem('ss_recent','[]'); renderRecent(); };
window.deleteRecent = function(i) { recentSearches.splice(i,1); localStorage.setItem('ss_recent',JSON.stringify(recentSearches)); renderRecent(); };
window.applyRecent = function(label) {
  // 최근 검색 항목에서 큐레이터 이름 찾아 선택
  const c = STAR_CURATORS.find(c => label.includes(c.name));
  if (c) {
    selCurator = c.name;
    document.querySelectorAll('.curator-pill').forEach(p => p.classList.toggle('on', p.dataset.curator === c.name));
  }
  updateSearchInfo();
  doMobileSearch();
};

// ── 검색 실행 ──
window.doMobileSearch = async function() {
  const textQ = document.getElementById('textSearch').value.trim();
  const label = textQ || [selCurator||'전체', selCat!=='전체'?selCat:'', selRegion||'전국'].filter(Boolean).join(' · ');
  saveRecent(label);

  showScreen('list');
  document.getElementById('listScreenTitle').textContent = label;
  document.getElementById('listCountTxt').textContent = '검색 중...';
  document.getElementById('listBody').innerHTML = '<div class="loading"><div class="loading-spin"></div><div class="loading-txt">불러오는 중...</div></div>';

  try {
    if (textQ) {
      // 텍스트 직접 검색
      const curator = STAR_CURATORS.find(c => c.name === textQ || c.name.includes(textQ));
      if (curator) {
        await loadByCurator(curator.name);
      } else {
        await loadAll(textQ);
      }
    } else if (selRegion) {
      await loadByRegion(selRegion, selCurator, selCat);
    } else if (selCurator) {
      await loadByCurator(selCurator);
    } else {
      await loadAll('');
    }
  } catch(e) { showEmpty('데이터를 불러오지 못했어요'); }
};

async function loadByCurator(celeb) {
  const snap = await getDocs(query(collection(db, 'restaurants'), where('celeb','==',celeb), limit(300)));
  DATA = [];
  snap.forEach(d => {
    const r = d.data();
    DATA.push({id:d.id, ...r, name:r.name||'', celeb:r.celeb||celeb, celebs:r.celebs||[celeb], cat:r.category||r.cat||'한식', area:r.area||'', address:r.address||'', comment:r.comment||'', yt:r.yt||'', lat:r.lat||37.5665, lng:r.lng||126.9780, visits:r.visits||0, saves:r.saves||0, avgRating:r.avgRating||0, ratingCount:r.ratingCount||0, phone:r.phone||'', place_url:r.place_url||''});
  });
  renderList();
}

async function loadByRegion(region, curator, cat) {
  const snap = await getDocs(query(collection(db, 'restaurants'), limit(1500)));
  DATA = [];
  snap.forEach(d => {
    const r = d.data();
    if (!matchRegion(r, region)) return;
    if (curator && r.celeb !== curator) return;
    if (cat && cat !== '전체' && (r.category||r.cat) !== cat) return;
    DATA.push({id:d.id, ...r, name:r.name||'', celeb:r.celeb||'', celebs:r.celebs||[r.celeb||''], cat:r.category||r.cat||'한식', area:r.area||'', address:r.address||'', comment:r.comment||'', yt:r.yt||'', lat:r.lat||37.5665, lng:r.lng||126.9780, visits:r.visits||0, saves:r.saves||0, avgRating:r.avgRating||0, ratingCount:r.ratingCount||0, phone:r.phone||'', place_url:r.place_url||''});
  });
  renderList();
}

async function loadAll(textQ) {
  const snap = await getDocs(query(collection(db, 'restaurants'), limit(500)));
  DATA = [];
  snap.forEach(d => {
    const r = d.data();
    if (textQ && !r.name?.includes(textQ) && !r.area?.includes(textQ) && !r.celeb?.includes(textQ) && !r.comment?.includes(textQ)) return;
    DATA.push({id:d.id, ...r, name:r.name||'', celeb:r.celeb||'', celebs:r.celebs||[r.celeb||''], cat:r.category||r.cat||'한식', area:r.area||'', address:r.address||'', comment:r.comment||'', yt:r.yt||'', lat:r.lat||37.5665, lng:r.lng||126.9780, visits:r.visits||0, saves:r.saves||0, avgRating:r.avgRating||0, ratingCount:r.ratingCount||0, phone:r.phone||'', place_url:r.place_url||''});
  });
  renderList();
}

window.setSort = function(v) {
  selSort = v;
  renderList();
};

function getSorted() {
  const items = [...DATA];
  if (selCat !== '전체') return items.filter(d => d.cat === selCat).sort(sortFn);
  return items.sort(sortFn);
}
function sortFn(a,b) {
  if (selSort==='rating') return (b.avgRating||0)-(a.avgRating||0);
  if (selSort==='saves') return (b.saves||0)-(a.saves||0);
  return (b.visits||0)-(a.visits||0);
}

function renderList() {
  const items = getSorted();
  const body = document.getElementById('listBody');
  document.getElementById('listCountTxt').textContent = `${items.length}곳`;
  if (!items.length) { showEmpty('검색 결과가 없어요'); return; }
  body.innerHTML = items.map((d,i) => {
    const nc = i===0?'n1':i===1?'n2':i===2?'n3':'';
    const stars = d.avgRating ? '★'.repeat(Math.round(d.avgRating)) : '';
    return `<div class="rest-item" onclick="openDetail('${d.id}')">
      <div class="rest-num ${nc}">${i+1}</div>
      <div class="rest-info">
        <div class="rest-name">${d.name}</div>
        <div class="rest-celeb">⭐ ${d.celeb} 방문</div>
        <div class="rest-meta">${d.cat} · ${d.area}</div>
        ${d.avgRating ? `<div class="rest-rating"><span style="color:var(--gold)">${stars}</span> ${d.avgRating.toFixed(1)}</div>` : ''}
      </div>
      <i class="ti ti-chevron-right rest-arrow"></i>
    </div>`;
  }).join('');
}

function showEmpty(msg) {
  document.getElementById('listBody').innerHTML = `<div class="empty-result"><div class="empty-icon">🍽️</div><div class="empty-txt">${msg}</div><div class="empty-sub">다른 조건으로 검색해보세요</div></div>`;
}

// ── 가게 상세 ──
window.openDetail = async function(id) {
  const d = DATA.find(x => x.id === id);
  if (!d) return;
  currentRest = d;
  showScreen('detail');
  document.getElementById('detailTitle').textContent = d.name;
  updateDoc(doc(db, 'restaurants', id), {visits: increment(1)}).catch(()=>{});

  const isSaved = savedList.includes(id);
  const info = document.getElementById('detailInfo');
  info.innerHTML = `
    <div class="detail-name">${d.name}</div>
    <div class="detail-celeb">⭐ ${d.celeb} 방문</div>
    <div class="detail-cat">${d.cat} · ${d.area}</div>
    ${d.comment ? `<div class="detail-comment">"${d.comment}"</div>` : ''}
    ${d.address ? `<div class="detail-addr"><i class="ti ti-map-pin" style="font-size:16px;color:var(--text3);flex-shrink:0;margin-top:1px"></i><div class="detail-addr-text">${d.address}</div></div>` : ''}
    ${d.phone ? `<div class="detail-phone"><i class="ti ti-phone" style="font-size:16px;color:var(--text3)"></i><a href="tel:${d.phone}">${d.phone}</a></div>` : ''}
    <div class="action-grid">
      <button class="action-btn primary" onclick="openKakaoMap()"><i class="ti ti-map"></i>길찾기</button>
      ${d.yt ? `<button class="action-btn red" onclick="openYoutube()"><i class="ti ti-brand-youtube"></i>영상</button>` :
        `<button class="action-btn" onclick="searchYoutube()"><i class="ti ti-brand-youtube" style="color:#FF0000"></i>영상 검색</button>`}
      <button class="action-btn${isSaved?' saved':''}" id="saveBtn" onclick="toggleSave('${id}')">
        <i class="ti ti-heart"></i>${isSaved?'저장됨':'저장'}
      </button>
      <button class="action-btn" onclick="openNaverMap()"><i class="ti ti-map-2" style="color:#03C75A"></i>네이버지도</button>
    </div>
    <button class="naver-btn" onclick="openNaverMap()">🟢 네이버지도에서 자세히 보기</button>
    <div class="comment-section">
      <div class="comment-title">💬 댓글 · 평점</div>
      <div id="commentList"><div style="font-size:13px;color:var(--text3);padding:8px 0">로딩 중...</div></div>
      ${currentUser ? `
        <div class="comment-form">
          <div class="star-row" id="starRow">
            ${[1,2,3,4,5].map(n=>`<button class="star-btn" onclick="setRating(${n})">★</button>`).join('')}
          </div>
          <textarea class="comment-input" id="commentInput" rows="2" placeholder="이 맛집 어떠셨나요?"></textarea>
          <button class="comment-submit" onclick="submitComment('${id}')">등록</button>
          <div style="clear:both"></div>
        </div>` : `<div style="font-size:13px;color:var(--text3);margin-top:8px">로그인 후 댓글을 남길 수 있어요</div>`}
    </div>
    <div style="height:20px"></div>`;

  loadComments(id);

  // 지도 초기화
  setTimeout(() => {
    const container = document.getElementById('detail-map');
    if (!container) return;
    if (detailMap) {
      kakao.maps.event.trigger(detailMap, 'resize');
      detailMap.setCenter(new kakao.maps.LatLng(d.lat, d.lng));
    } else {
      detailMap = new kakao.maps.Map(container, {center: new kakao.maps.LatLng(d.lat, d.lng), level: 4});
    }
    new kakao.maps.Marker({map: detailMap, position: new kakao.maps.LatLng(d.lat, d.lng)});
  }, 100);
};

window.openKakaoMap = function() {
  if (!currentRest) return;
  window.open(`https://map.kakao.com/link/search/${encodeURIComponent(currentRest.name)}`, '_blank');
};
window.openNaverMap = function() {
  if (!currentRest) return;
  window.open(`https://map.naver.com/v5/search/${encodeURIComponent(currentRest.name + ' ' + currentRest.area)}`, '_blank');
};
window.openYoutube = function() {
  if (!currentRest) return;
  window.open(currentRest.yt, '_blank');
};
window.searchYoutube = function() {
  if (!currentRest) return;
  window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(currentRest.celeb + ' ' + currentRest.name)}`, '_blank');
};

window.toggleSave = async function(id) {
  if (!currentUser) { toast('로그인 후 저장할 수 있어요!'); return; }
  const idx = savedList.indexOf(id);
  const wasSaved = idx >= 0;
  if (wasSaved) savedList.splice(idx,1); else savedList.push(id);
  await setDoc(doc(db, 'users', currentUser.uid), {saved: savedList}, {merge:true});
  await updateDoc(doc(db, 'restaurants', id), {saves: increment(wasSaved?-1:1)});
  const btn = document.getElementById('saveBtn');
  if (btn) { btn.className = `action-btn${wasSaved?'':' saved'}`; btn.innerHTML = `<i class="ti ti-heart"></i>${wasSaved?'저장':'저장됨'}`; }
  toast(wasSaved ? '저장 취소됐어요' : '저장됐어요 ❤️');
};

window.setRating = function(n) {
  myRating = n;
  document.querySelectorAll('.star-btn').forEach((b,i) => b.classList.toggle('on', i<n));
};

async function loadComments(id) {
  try {
    const snap = await getDocs(query(collection(db, 'restaurants', id, 'comments'), orderBy('createdAt','desc'), limit(10)));
    const el = document.getElementById('commentList');
    if (!el) return;
    if (snap.empty) { el.innerHTML = '<div style="font-size:13px;color:var(--text3);padding:8px 0">아직 댓글이 없어요. 첫 번째로 남겨보세요!</div>'; return; }
    el.innerHTML = snap.docs.map(d => {
      const c = d.data();
      const stars = c.rating ? '★'.repeat(c.rating)+'☆'.repeat(5-c.rating) : '';
      return `<div class="comment-item"><div class="comment-user">${c.userName||'익명'}</div>${stars?`<div class="comment-stars">${stars}</div>`:''}<div class="comment-text">${c.text||''}</div></div>`;
    }).join('');
  } catch(e) {}
}

window.submitComment = async function(id) {
  if (!currentUser) return;
  const text = document.getElementById('commentInput')?.value?.trim();
  if (!text && !myRating) { toast('댓글이나 별점을 입력해주세요'); return; }
  await addDoc(collection(db, 'restaurants', id, 'comments'), {
    userId: currentUser.uid, userName: currentUser.displayName||'사용자',
    text, rating: myRating, createdAt: new Date().toISOString()
  });
  if (myRating) {
    const snap = await getDocs(query(collection(db,'restaurants',id,'comments')));
    const ratings = snap.docs.map(d=>d.data().rating).filter(Boolean);
    if (ratings.length) {
      const avg = ratings.reduce((a,b)=>a+b,0)/ratings.length;
      await updateDoc(doc(db,'restaurants',id), {avgRating: Math.round(avg*10)/10, ratingCount: ratings.length});
    }
  }
  document.getElementById('commentInput').value = '';
  myRating = 0;
  document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('on'));
  toast('댓글이 등록됐어요! 🎉');
  loadComments(id);
};

// ── 화면 전환 ──
function showScreen(name) {
  const screens = {home:'screen-home', list:'screen-list', detail:'screen-detail'};
  const order = ['home','list','detail'];
  const cur = screenStack[screenStack.length-1];
  const curIdx = order.indexOf(cur);
  const newIdx = order.indexOf(name);

  if (name === cur) return;

  // 현재 화면 왼쪽으로
  const curEl = document.getElementById(screens[cur]);
  curEl.classList.remove('active');
  curEl.classList.add('hidden-left');

  // 새 화면 오른쪽에서 들어옴
  const newEl = document.getElementById(screens[name]);
  newEl.classList.remove('hidden-right','hidden-left');
  newEl.classList.add('active');

  screenStack.push(name);
}

window.goBack = function() {
  if (screenStack.length <= 1) return;
  const screens = {home:'screen-home', list:'screen-list', detail:'screen-detail'};
  const cur = screenStack.pop();
  const prev = screenStack[screenStack.length-1];

  const curEl = document.getElementById(screens[cur]);
  curEl.classList.remove('active');
  curEl.classList.add('hidden-right');

  const prevEl = document.getElementById(screens[prev]);
  prevEl.classList.remove('hidden-left','hidden-right');
  prevEl.classList.add('active');

  // 지도 리사이즈
  if (prev === 'detail' && detailMap) setTimeout(()=>kakao.maps.event.trigger(detailMap,'resize'),100);
};

window.goHome = function() {
  const screens = {home:'screen-home', list:'screen-list', detail:'screen-detail'};
  // 모든 화면 숨기고 홈만 활성화
  Object.entries(screens).forEach(([name, id]) => {
    const el = document.getElementById(id);
    el.classList.remove('active','hidden-left','hidden-right');
    if (name === 'home') el.classList.add('active');
    else el.classList.add('hidden-right');
  });
  screenStack = ['home'];
};

// ── 토스트 ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── 초기화 ──
loadCurators();
renderRecent();
updateSearchInfo();
</script>
