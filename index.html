<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="google-site-verification" content="XGoCpZb8cXF7IvyeIMGRJJJXuccKIIS26WrqtbAdujo" />
<meta name="naver-site-verification" content="6f4b79f996ee96a01d32863c2fd978e0a215db4b" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starspoon — 연예인 맛집 큐레이터 플랫폼</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=25b433faf5d746c938cbcc7658f650b0&libraries=services"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#F59E0B;--gold2:#FCD34D;--gold-bg:rgba(245,158,11,0.08);
  --bg:#FAFAF8;--bg2:#F4F3EF;--bg3:#EEECEA;--white:#fff;
  --text:#1A1A18;--text2:#5A5A56;--text3:#9A9A96;
  --border:#E8E7E3;--border2:#D4D3CF;
  --red:#EF4444;--blue:#3B82F6;--green:#10B981;--purple:#8B5CF6;
  --spoon:#9A9A96;--silver:#94A3B8;--gold-grade:#F59E0B;--star:#F59E0B;
  --radius:10px;--radius-lg:16px;--radius-xl:20px;
  --shadow:0 2px 8px rgba(0,0,0,0.06);--shadow-lg:0 8px 24px rgba(0,0,0,0.10);
  --kakao:#FEE500;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ── 헤더 ── */
.header{background:var(--white);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.logo-icon{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.logo-text span{color:var(--gold)}
.header-search{flex:1;max-width:420px;position:relative}
.header-search input{width:100%;height:36px;border-radius:18px;border:1.5px solid var(--border2);background:var(--bg2);padding:0 14px 0 38px;font-size:13px;color:var(--text);outline:none;transition:all .2s}
.header-search input:focus{border-color:var(--gold);background:var(--white);box-shadow:0 0 0 3px rgba(245,158,11,0.12)}
.header-search .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-report{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-report:hover{background:#D97706}
.btn-login-g{background:var(--white);color:#444;border:1.5px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-login-k{background:var(--kakao);color:#000;border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.user-info{display:flex;align-items:center;gap:8px;font-size:13px}
.user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.user-grade{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--gold-bg);color:var(--gold)}
.btn-logout{background:none;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text3);cursor:pointer}

/* ── 카테고리 바 ── */
.cat-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;height:44px;align-items:center}
.cat-bar::-webkit-scrollbar{display:none}
.cat{border:1.5px solid var(--border2);border-radius:16px;padding:4px 13px;font-size:12px;font-weight:500;color:var(--text2);background:var(--white);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.cat:hover{border-color:var(--gold);color:var(--gold)}
.cat.on{background:var(--gold);border-color:var(--gold);color:#fff}

/* ── 메인 레이아웃 ── */
.layout{display:flex;height:calc(100vh - 100px)}

/* ── 왼쪽: 큐레이터 패널 ── */
.curator-panel{width:220px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.curator-panel-header{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.curator-panel-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.curator-tabs{display:flex;gap:4px;margin-bottom:0}
.ctab{flex:1;padding:5px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);border-radius:8px;cursor:pointer;text-align:center;color:var(--text2);background:none;transition:all .15s}
.ctab.on{background:var(--gold);border-color:var(--gold);color:#fff}
.curator-list{flex:1;overflow-y:auto;padding:8px}
.curator-list::-webkit-scrollbar{width:3px}
.curator-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.curator-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .12s;margin-bottom:2px}
.curator-item:hover,.curator-item.on{background:var(--gold-bg)}
.curator-item.on .curator-name{color:var(--gold);font-weight:700}
.curator-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;border:2px solid var(--border)}
.curator-avatar img{width:100%;height:100%;object-fit:cover}
.curator-avatar.star-curator{border-color:var(--gold);background:var(--gold-bg)}
.curator-info{flex:1;min-width:0}
.curator-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.curator-sub{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;margin-top:1px}
.curator-rank{font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-1{background:#FFD700;color:#7B5800}
.rank-2{background:#C0C0C0;color:#555}
.rank-3{background:#CD7F32;color:#fff}
.rank-n{background:var(--bg3);color:var(--text3);font-size:9px}

/* ── 가운데: 맛집 리스트 ── */
.list-panel{width:380px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.list-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.list-title{font-size:13px;font-weight:700;color:var(--text)}
.list-count{font-size:12px;color:var(--text3)}
.sort-select{border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text2);background:var(--white);cursor:pointer;outline:none}
.list-body{flex:1;overflow-y:auto}
.list-body::-webkit-scrollbar{width:4px}
.list-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── 맛집 카드 ── */
.rest-card{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative}
.rest-card:hover,.rest-card.on{background:var(--bg2)}
.rest-card-top{display:flex;gap:10px;margin-bottom:8px}
.rest-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.rest-info{flex:1;min-width:0}
.rest-name{font-weight:700;font-size:14px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rest-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.rest-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--gold-bg);color:#B45309}
.rest-cat{font-size:11px;color:var(--text3)}
.rest-area{font-size:11px;color:var(--text3)}
.rest-comment{font-size:12px;color:var(--text2);line-height:1.5;padding:7px 10px;background:var(--bg2);border-radius:8px;border-left:2.5px solid var(--gold);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rest-foot{display:flex;align-items:center;gap:6px}
.rest-rating{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--gold);font-weight:600}
.rest-rating-count{font-size:11px;color:var(--text3);font-weight:400}
.rest-saves{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:2px}
.rest-btns{margin-left:auto;display:flex;gap:4px}
.btn-sm{border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--text2);background:none;cursor:pointer;display:flex;align-items:center;gap:3px;transition:all .15s;white-space:nowrap}
.btn-sm:hover{background:var(--bg2)}
.btn-sm.saved{color:var(--gold);border-color:var(--gold);background:var(--gold-bg)}
.btn-sm.map{color:var(--gold);border-color:var(--gold)}
.rest-link{display:flex;align-items:center;gap:4px;margin-top:6px}
.link-btn{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:3px 8px;border-radius:5px;text-decoration:none;font-weight:500;border:1px solid}
.link-yt{color:#CC0000;background:rgba(204,0,0,0.05);border-color:rgba(204,0,0,0.2)}
.link-add{color:var(--text3);background:var(--bg2);border-color:var(--border2);cursor:pointer}

/* ── 오른쪽: 지도+상세 ── */
.map-panel{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column}
.map-tabs{background:var(--white);border-bottom:1px solid var(--border);display:flex;padding:0 16px;gap:0;flex-shrink:0}
.mtab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap}
.mtab:hover{color:var(--text)}
.mtab.on{color:var(--gold);border-bottom-color:var(--gold)}
#kakao-map{width:100%;flex:1}
.map-wrap{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* ── 순위 페이지 ── */
.rank-page{flex:1;overflow-y:auto;background:var(--bg);padding:20px;display:none}
.rank-page.show{display:block}
.rank-section{margin-bottom:28px}
.rank-section-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.rank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.rank-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:10px;transition:box-shadow .15s}
.rank-card:hover{box-shadow:var(--shadow)}
.rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-weight:600;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-meta{font-size:11px;color:var(--text3)}
.rank-score{font-size:13px;font-weight:700;color:var(--gold)}

/* ── 마이 페이지 ── */
.my-page{flex:1;overflow-y:auto;background:var(--bg);padding:20px;display:none}
.my-page.show{display:block}
.my-profile{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.my-avatar{width:60px;height:60px;border-radius:50%;background:var(--gold-bg);display:flex;align-items:center;justify-content:center;font-size:28px;border:3px solid var(--gold);flex-shrink:0;overflow:hidden}
.my-avatar img{width:100%;height:100%;object-fit:cover}
.my-name{font-size:16px;font-weight:700;margin-bottom:4px}
.my-grade-badge{display:inline-flex;align-items:center;gap:4px;background:var(--gold-bg);color:var(--gold);font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px;margin-bottom:8px}
.my-points{font-size:13px;color:var(--text2)}
.my-points strong{color:var(--gold);font-size:16px}
.my-stats{display:flex;gap:16px;margin-top:8px}
.my-stat{text-align:center}
.my-stat-num{font-size:18px;font-weight:700;color:var(--text)}
.my-stat-label{font-size:11px;color:var(--text3)}
.point-history{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.point-history-title{font-size:13px;font-weight:700;margin-bottom:12px}
.point-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.point-item:last-child{border-bottom:none}
.point-plus{color:var(--green);font-weight:700}

/* ── 모달 ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--white);border-radius:var(--radius-lg);width:500px;max-width:92vw;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);line-height:1;padding:0}
.modal-bd{flex:1;overflow-y:auto;padding:16px 20px}

/* ── 제보 모달 ── */
.report-modal{width:560px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px}
.form-input{width:100%;border:1.5px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13px;outline:none;box-sizing:border-box;transition:border-color .2s;background:var(--white)}
.form-input:focus{border-color:var(--gold)}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px}
.search-result-item{padding:8px 10px;border:1px solid var(--border2);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.search-result-item:hover{border-color:var(--gold);background:var(--gold-bg)}
.search-result-name{font-weight:600;font-size:13px}
.search-result-addr{font-size:11px;color:var(--text3);margin-top:2px}
.selected-rest{background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:8px;padding:10px 12px;margin-bottom:14px;display:none}
.selected-rest-name{font-weight:700;font-size:13px;color:var(--gold)}
.selected-rest-addr{font-size:11px;color:var(--text2);margin-top:2px}
.link-type-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.link-type-tag{font-size:11px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:3px 10px;color:var(--text3)}
.btn-yt-search{width:100%;padding:9px;background:#FF0000;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{width:100%;padding:12px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:#D97706}
.notice{font-size:11px;color:var(--text3);margin-bottom:12px;line-height:1.6}

/* ── 댓글 모달 ── */
.comment-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.comment-item{background:var(--bg2);border-radius:10px;padding:12px}
.comment-user{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.comment-avatar{width:26px;height:26px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:600;flex-shrink:0;overflow:hidden}
.comment-avatar img{width:100%;height:100%;object-fit:cover}
.comment-name{font-size:13px;font-weight:600}
.comment-grade{font-size:10px;color:var(--gold);font-weight:700}
.comment-date{font-size:11px;color:var(--text3);margin-left:auto}
.comment-stars{font-size:13px;margin-bottom:4px}
.comment-text{font-size:13px;color:var(--text2);line-height:1.5}
.comment-form{border-top:1px solid var(--border);padding-top:14px}
.star-row{display:flex;gap:4px;margin-bottom:8px}
.star{font-size:22px;cursor:pointer;color:var(--border2);transition:color .1s}
.star.on{color:var(--gold)}
.comment-form textarea{width:100%;border:1.5px solid var(--border2);border-radius:8px;padding:10px;font-size:13px;font-family:inherit;resize:none;height:70px;outline:none;transition:border-color .2s}
.comment-form textarea:focus{border-color:var(--gold)}
.comment-form-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.btn-submit{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer}

/* ── 토스트 ── */
.toast{position:fixed;bottom:20px;right:20px;background:#1A1A18;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;display:none;align-items:center;gap:8px;z-index:999;box-shadow:var(--shadow-lg);max-width:320px}
.toast.show{display:flex}

/* ── 지도 커스텀 오버레이 ── */
.map-tip{background:var(--white);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;min-width:160px;max-width:200px;box-shadow:var(--shadow);cursor:pointer}
.map-tip-name{font-weight:700;font-size:13px;color:var(--text);margin-bottom:2px}
.map-tip-who{font-size:10px;color:#B45309;font-weight:700;margin-bottom:3px}
.map-tip-comment{font-size:11px;color:var(--text2);line-height:1.4}

/* ── 빈 상태 ── */
.empty{padding:48px 20px;text-align:center;color:var(--text3)}
.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:.35}
.empty p{font-size:14px}

/* ── 페이지 탭 (상단) ── */
.page-nav{background:var(--white);border-bottom:1px solid var(--border);display:flex;padding:0 20px;gap:0;flex-shrink:0}
.pnav{padding:11px 18px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap}
.pnav:hover{color:var(--text)}
.pnav.on{color:var(--gold);border-bottom-color:var(--gold)}

/* ── 모바일 ── */
@media(max-width:768px){
  .curator-panel{display:none}
  .list-panel{width:100%}
  .map-panel{display:none}
  .layout{height:calc(100vh - 88px)}
  .header{padding:0 12px;gap:8px}
  .logo-text{font-size:14px}
  .header-search{max-width:none;flex:1}
  .btn-report span{display:none}
  .cat-bar{padding:0 12px}
}
</style>
</head>
<body>

<!-- ── 헤더 ── -->
<header class="header">
  <a class="logo" href="/">
    <div class="logo-icon">🥄</div>
    <span class="logo-text">Star<span>spoon</span></span>
  </a>
  <div class="header-search">
    <i class="ti ti-search si"></i>
    <input type="text" id="mainSearch" placeholder="맛집·연예인·지역 검색" oninput="doSearch(this.value)" onkeydown="if(event.key==='Enter'){doSearch(this.value)}">
  </div>
  <div class="header-right">
    <button class="btn-report" onclick="openReportModal()">
      <i class="ti ti-plus"></i><span>맛집 제보</span>
    </button>
    <div id="authArea"></div>
  </div>
</header>

<!-- ── 카테고리 바 ── -->
<div class="cat-bar">
  <button class="cat on" onclick="setCat(this,'전체')">전체</button>
  <button class="cat" onclick="setCat(this,'한식')">🍚 한식</button>
  <button class="cat" onclick="setCat(this,'국밥·탕')">🍲 국밥·탕</button>
  <button class="cat" onclick="setCat(this,'고기')">🥩 고기</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

const firebaseConfig = {
  apiKey: "AIzaSyC5nf84GbQQ_5vIDwhIvTZ5zPqf7nrnSxU",
  authDomain: "starspoon-120d7.firebaseapp.com",
  projectId: "starspoon-120d7",
  storageBucket: "starspoon-120d7.firebasestorage.app",
  messagingSenderId: "672370227821",
  appId: "1:672370227821:web:aea1d9c6ca8587842a5d64"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();
window.Kakao.init('25b433faf5d746c938cbcc7658f650b0');

// ── 상태 ──
let currentUser = null;
let currentUserData = null;
let DATA = [];
let selCurator = '성시경';
let selCuratorTab = 'star';
let selCat = '전체';
let selSort = 'rating';

let map, markers = [], overlays = [];

let currentCommentId = null;

// ── 고정 스타 큐레이터 ──
const STAR_CURATORS = [
  {name:'성시경', icon:'🎵', color:'#F59E0B'},
  {name:'풍자', icon:'😄', color:'#EF4444'},
  {name:'백종원', icon:'👨‍🍳', color:'#3B82F6'},
  {name:'이영자', icon:'😋', color:'#10B981'},
  {name:'나얼', icon:'🎤', color:'#8B5CF6'},
  {name:'홍진경', icon:'💃', color:'#EC4899'},
  {name:'쯔양', icon:'🍖', color:'#F97316'},
  {name:'유재석', icon:'😆', color:'#06B6D4'},
  {name:'히밥', icon:'🍱', color:'#84CC16'},
  {name:'승우아빠', icon:'👨‍👧', color:'#A78BFA'},

];

// ── 등급 시스템 ──
function getGrade(points) {
  if (points >= 700) return {name:'별스푼', icon:'⭐', color:'#F59E0B'};
  if (points >= 300) return {name:'금스푼', icon:'🥇', color:'#F59E0B'};
  if (points >= 100) return {name:'은스푼', icon:'🥈', color:'#94A3B8'};
  return {name:'스푼', icon:'🥄', color:'#9A9A96'};
}

function getGradeMultiplier(points) {
  if (points >= 700) return 10;
  if (points >= 300) return 5;
  if (points >= 100) return 3;
  return 1;
}

// ── 포인트 지급 ──
async function addPoints(uid, points, reason) {
  if (!uid) return;
  const userRef = doc(db, 'users', uid);
  await updateDoc(userRef, {
    points: increment(points),
    [`pointHistory`]: [...((await getDoc(userRef)).data()?.pointHistory || []),
      {points, reason, at: new Date().toISOString()}].slice(-50)
  });
  if (currentUser?.uid === uid) {
    currentUserData = (await getDoc(userRef)).data();
    renderAuthArea();
  }
}

// ── 구글 로그인 ──
window.loginWithGoogle = async function() {
  try {
    const result = await signInWithPopup(auth, googleProvider);
    const user = result.user;
    const userRef = doc(db, 'users', user.uid);
    const snap = await getDoc(userRef);
    if (!snap.exists()) {
      await setDoc(userRef, {
        displayName: user.displayName || '사용자',
        photoURL: user.photoURL || '',
        email: user.email || '',
        points: 20,
        pointHistory: [{points:20, reason:'회원가입 보너스', at: new Date().toISOString()}],
        saved: [],
        registeredRests: [],
        createdAt: new Date().toISOString()
      });
      showToast('환영해요! 🎉 가입 보너스 20점 적립!');
    }
  } catch(e) { showToast('로그인 실패: ' + e.message); }
};

window.loginWithKakao = function() {
  window.Kakao.Auth.authorize({ redirectUri: window.location.origin });
};

window.logoutUser = async function() {
  await signOut(auth);
  currentUser = null; currentUserData = null; savedList = [];
  renderAuthArea();
  showToast('로그아웃됐어요');
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    const snap = await getDoc(doc(db, 'users', user.uid));
    currentUserData = snap.exists() ? snap.data() : null;
    savedList = currentUserData?.saved || [];
    renderAuthArea();
    renderList();
  } else {
    currentUser = null; currentUserData = null; savedList = [];
    renderAuthArea();
    renderList();
  }
});

function renderAuthArea() {
  const area = document.getElementById('authArea');
  if (currentUser) {
    const pts = currentUserData?.points || 0;
    const grade = getGrade(pts);
    const name = currentUser.displayName || '사용자';
    const photo = currentUser.photoURL || '';
    area.innerHTML = `
      <div class="user-info">
        ${photo ? `<img class="user-avatar" src="${photo}" onerror="this.style.display='none'">` : ''}
        <span style="font-size:13px;font-weight:600">${name}</span>
        <span class="user-grade">${grade.icon} ${grade.name}</span>
        <span style="font-size:12px;color:var(--gold);font-weight:700">${pts}pt</span>
        <button class="btn-logout" onclick="logoutUser()">로그아웃</button>
      </div>`;
  } else {
    area.innerHTML = `
      <button class="btn-login-g" onclick="loginWithGoogle()"><i class="ti ti-brand-google"></i> 구글</button>
      <button class="btn-login-k" onclick="loginWithKakao()">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path fill="#000" d="M9 1.5C4.86 1.5 1.5 4.14 1.5 7.41c0 2.1 1.38 3.93 3.45 4.98L4.2 15l3.27-2.16c.48.06.99.09 1.53.09 4.14 0 7.5-2.64 7.5-5.91S13.14 1.5 9 1.5z"/></svg>
        카카오
      </button>`;
  }
}

// ── 큐레이터 탭 ──
window.setCuratorTab = function(tab, el) {
  selCuratorTab = tab;
  document.querySelectorAll('.ctab').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  renderCuratorList();
};

async function renderCuratorList() {
  const list = document.getElementById('curatorList');
  if (selCuratorTab === 'star') {
    list.innerHTML = STAR_CURATORS.map((c, i) => {
      const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
      return `<div class="curator-item${selCurator===c.name?' on':''}" onclick="selectCurator('${c.name}')">
        <div class="rank-num ${rankClass}" style="font-size:10px">${i+1}</div>
        <div class="curator-avatar star-curator">${c.icon}</div>
        <div class="curator-info">
          <div class="curator-name">${c.name}</div>
          <div class="curator-sub"><i class="ti ti-map-pin" style="font-size:10px"></i> 맛집 로딩중</div>
        </div>
      </div>`;
    }).join('');
  } else {
    // 일반 큐레이터 (등록 10개 이상)
    try {
      const snap = await getDocs(query(collection(db, 'users'), orderBy('points', 'desc'), limit(20)));
      const users = [];
      snap.forEach(d => {
        const data = d.data();
        if ((data.registeredRests || []).length >= 10) {
          users.push({id: d.id, ...data});
        }
      });
      if (!users.length) {
        list.innerHTML = `<div class="empty"><i class="ti ti-user"></i><p>아직 일반 큐레이터가 없어요<br><small>맛집 10개 이상 등록하면 활성화!</small></p></div>`;
        return;
      }
      list.innerHTML = users.map((u, i) => {
        const grade = getGrade(u.points || 0);
        const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
        return `<div class="curator-item${selCurator===u.displayName?' on':''}" onclick="selectCurator('${u.displayName}','${u.id}')">
          <div class="rank-num ${rankClass}" style="font-size:10px">${i+1}</div>
          <div class="curator-avatar">${u.photoURL ? `<img src="${u.photoURL}">` : grade.icon}</div>
          <div class="curator-info">
            <div class="curator-name">${u.displayName}</div>
            <div class="curator-sub">${grade.icon} ${grade.name} · ${u.points||0}pt</div>
          </div>
        </div>`;
      }).join('');
    } catch(e) {
      list.innerHTML = `<div class="empty"><p>불러오기 실패</p></div>`;
    }
  }
}

window.selectCurator = async function(name, uid) {
  selCurator = name;
  document.getElementById('listTitle').textContent = name + ' 맛집';
  renderCuratorList();
  await loadRests(name);
};

// ── 데이터 로드 ──
async function loadRests(celeb) {
  try {
    document.getElementById('listCount').textContent = '로딩 중...';
    let q = query(collection(db, 'restaurants'), where('celeb', '==', celeb), orderBy('name'), limit(100));
    const snap = await getDocs(q);
    DATA = [];
    snap.forEach(d => {
      const r = d.data();
      DATA.push({
        id: d.id,
        name: r.name || '',
        celeb: r.celeb || '',
        celebs: r.celebs || [r.celeb || ''],
        cat: r.category || r.cat || '한식',
        area: r.area || '',
        comment: r.comment || '',
        yt: r.video_url || r.yt || '',
        lat: r.lat || 37.5665,
        lng: r.lng || 126.9780,
        visits: r.visits || 0,
        saves: r.saves || 0,
        avgRating: r.avgRating || 0,
        ratingCount: r.ratingCount || 0,
        registeredBy: r.registeredBy || null,
      });
    });
    renderList();
    renderPins();
  } catch(e) {
    console.log('로드 오류:', e);
    try {
      const snap = await getDocs(query(collection(db, 'restaurants'), limit(100)));
      DATA = [];
      snap.forEach(d => {
        const r = d.data();
        if (r.celeb === celeb) DATA.push({id:d.id, name:r.name||'', celeb:r.celeb||'', celebs:r.celebs||[r.celeb||''], cat:r.category||r.cat||'한식', area:r.area||'', comment:r.comment||'', yt:r.video_url||r.yt||'', lat:r.lat||37.5665, lng:r.lng||126.9780, visits:r.visits||0, saves:r.saves||0, avgRating:r.avgRating||0, ratingCount:r.ratingCount||0});
      });
      renderList();
      renderPins();
    } catch(e2) {}
  }
}

function filtered() {
  let items = DATA.filter(d => {
    if (selCat !== '전체' && d.cat !== selCat) return false;
    if (searchQ) {
      const q = searchQ;
      if (!d.name.includes(q) && !d.area.includes(q) && !d.comment.includes(q) && !d.celeb.includes(q)) return false;
    }
    return true;
  });
  if (selSort === 'rating') items.sort((a,b) => (b.avgRating||0)-(a.avgRating||0));
  else if (selSort === 'saves') items.sort((a,b) => (b.saves||0)-(a.saves||0));
  else items.sort((a,b) => (b.visits||0)-(a.visits||0));
  return items;
}

function renderList() {
  const items = filtered();
  document.getElementById('listCount').textContent = items.length + '곳';
  const list = document.getElementById('restList');
  if (!items.length) {
    list.innerHTML = '<div class="empty"><i class="ti ti-mood-empty"></i><p>맛집이 없어요</p></div>';
    return;
  }
  list.innerHTML = items.map((d, i) => {
    const isSaved = savedList.includes(d.id);
    const stars = d.avgRating ? '★'.repeat(Math.round(d.avgRating)) + '☆'.repeat(5-Math.round(d.avgRating)) : '';
    const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
    return `<div class="rest-card" id="card-${d.id}" onclick="focusCard('${d.id}')">
      <div class="rest-card-top">
        <div class="rest-rank rank-num ${rankClass}">${i+1}</div>
        <div class="rest-info">
          <div class="rest-name">${d.name}</div>
          <div class="rest-meta">
            <span class="rest-badge">${d.celeb}</span>
            <span class="rest-cat">${d.cat}</span>
            <span style="color:var(--border2)">·</span>
            <span class="rest-area">${d.area}</span>
          </div>
        </div>
      </div>
      <div class="rest-comment">"${d.comment || '이 맛집을 소개합니다'}"</div>
      <div class="rest-foot">
        <div class="rest-rating">
          ${d.avgRating ? `<span style="color:var(--gold)">★</span> ${d.avgRating.toFixed(1)}` : '<span style="color:var(--border2)">★</span> 평점없음'}
          <span class="rest-rating-count">${d.ratingCount ? `(${d.ratingCount})` : ''}</span>
        </div>
        <div class="rest-saves"><i class="ti ti-heart" style="font-size:11px"></i> ${d.saves||0}</div>
        <div class="rest-btns">
          <a class="btn-sm map" href="https://map.kakao.com/link/search/${encodeURIComponent(d.name)}" target="_blank" onclick="event.stopPropagation()">🗺️ 길찾기</a>
          <button class="btn-sm${isSaved?' saved':''}" onclick="event.stopPropagation();toggleSave('${d.id}')">
            ${isSaved?'❤️ 저장됨':'🤍 저장'}
          </button>
          <button class="btn-sm" onclick="event.stopPropagation();openCommentModal('${d.id}','${d.name.replace(/'/g,"\\'")}')">
            💬 댓글
          </button>
        </div>
      </div>
      <div class="rest-link">
        ${d.yt
          ? `<a class="link-btn link-yt" href="${d.yt}" target="_blank" onclick="event.stopPropagation()"><i class="ti ti-brand-youtube"></i> 영상 보기</a>`

window.toggleSave = async function(id) {
  if (!currentUser) { showToast('로그인 후 저장할 수 있어요!'); return; }
  const idx = savedList.indexOf(id);
  const wasSaved = idx >= 0;
  if (wasSaved) savedList.splice(idx, 1);
  else savedList.push(id);
  await setDoc(doc(db, 'users', currentUser.uid), {saved: savedList}, {merge: true});

  // 저장 카운트 업데이트
  const restRef = doc(db, 'restaurants', id);
  await updateDoc(restRef, {saves: increment(wasSaved ? -1 : 1)});

  // 등록자에게 포인트 지급
  if (!wasSaved) {
    const restSnap = await getDoc(restRef);
    const registeredBy = restSnap.data()?.registeredBy;
    if (registeredBy && registeredBy !== currentUser.uid) {
      const saverPts = currentUserData?.points || 0;
      const multiplier = getGradeMultiplier(saverPts);
      await addPoints(registeredBy, multiplier, `내 가게 저장 (${getGrade(saverPts).name})`);
    }
  }

  // 달성 보너스 체크
  if (!wasSaved) await checkAchievements(id);

  const d = DATA.find(x => x.id === id);
  if (d) d.saves = (d.saves||0) + (wasSaved ? -1 : 1);
  renderList();
  showToast(wasSaved ? '저장 취소됐어요' : '내 스푼에 저장됐어요! ❤️ +2pt');
};

// ── 달성 보너스 체크 ──
async function checkAchievements(restId) {
  const restSnap = await getDoc(doc(db, 'restaurants', restId));
  const data = restSnap.data();
  const registeredBy = data?.registeredBy;
  if (!registeredBy) return;
  const achievements = data?.achievements || {};

  // 저장 50명 달성
  if ((data.saves||0) >= 50 && !achievements.saves50) {
    await updateDoc(doc(db, 'restaurants', restId), {'achievements.saves50': true});
    await addPoints(registeredBy, 30, '내 가게 저장 50명 달성 보너스');
    showToast('🎉 저장 50명 달성! 30pt 보너스!');
  }
}

kakao.maps.load(function() {
  const container = document.getElementById('kakao-map');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(37.5550, 126.9700),
    level: 8
  });
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
  renderPins();
});

function renderPins() {
  markers.forEach(m => m.setMap(null));
  overlays.forEach(o => o.setMap(null));
  markers = []; overlays = [];
  filtered().forEach(d => {
    const pos = new kakao.maps.LatLng(d.lat, d.lng);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="42" viewBox="0 0 36 42"><path d="M18 0C8 0 0 8 0 18c0 12 18 24 18 24S36 30 36 18C36 8 28 0 18 0z" fill="#F59E0B"/><text x="18" y="24" text-anchor="middle" font-size="14">⭐</text></svg>`;
    const img = new kakao.maps.MarkerImage('data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg), new kakao.maps.Size(36,42), {offset: new kakao.maps.Point(18,42)});
    const marker = new kakao.maps.Marker({map, position: pos, image: img, title: d.name});
    const overlay = new kakao.maps.CustomOverlay({
      position: pos,
      content: `<div class="map-tip"><div class="map-tip-name">⭐ ${d.name}</div><div class="map-tip-who">${d.celeb} 방문</div><div class="map-tip-comment">${d.comment||''}</div></div>`,
      yAnchor: 2.2, zIndex: 3
    });
    kakao.maps.event.addListener(marker, 'mouseover', () => overlay.setMap(map));
    kakao.maps.event.addListener(marker, 'mouseout', () => overlay.setMap(null));
    kakao.maps.event.addListener(marker, 'click', () => {
      map.setCenter(pos); map.setLevel(4);
      const isSaved = savedList.includes(d.id);
      const infoContent = `<div style="padding:12px 14px;min-width:180px;max-width:240px;font-family:-apple-system,sans-serif">
        <div style="font-weight:700;font-size:14px;color:#1A1A18;margin-bottom:3px">⭐ ${d.name}</div>
        <div style="font-size:11px;color:#B45309;font-weight:600;margin-bottom:2px">${d.celeb} 방문</div>
        <div style="font-size:11px;color:#9A9A96;margin-bottom:10px">${d.cat} · ${d.area}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <a href="https://map.kakao.com/link/search/${encodeURIComponent(d.name)}" target="_blank" style="font-size:12px;color:#F59E0B;border:1px solid #F59E0B;border-radius:6px;padding:5px 10px;text-decoration:none;font-weight:600">🗺️ 길찾기</a>
          <button onclick="toggleSave('${d.id}')" style="font-size:12px;color:${isSaved?'#F59E0B':'#6B6B67'};border:1px solid ${isSaved?'#F59E0B':'#D4D3CF'};border-radius:6px;padding:5px 10px;background:none;cursor:pointer;font-weight:600">${isSaved?'❤️ 저장됨':'🤍 저장'}</button>
          <button onclick="openCommentModal('${d.id}','${d.name}')" style="font-size:12px;color:#6B6B67;border:1px solid #D4D3CF;border-radius:6px;padding:5px 10px;background:none;cursor:pointer;font-weight:600">💬 댓글</button>
        </div>
      </div>`;
      const iw = new kakao.maps.InfoWindow({content: infoContent, removable: true});
      iw.open(map, marker);
    });
    markers.push(marker); overlays.push(overlay);
  });
}

  } else {
    list.innerHTML = '';
    snap.forEach(c => {
      const data = c.data();
      const canDel = currentUser && (data.uid === currentUser.uid || currentUser.email === 'ohwoongg1@gmail.com');
      const div = document.createElement('div');
      div.className = 'comment-item';
      div.innerHTML = `
        <div class="comment-user">
          <div class="comment-avatar">${data.photoURL?`<img src="${data.photoURL}">`:(data.displayName?.[0]||'?')}</div>

        <div class="comment-text">${data.text}</div>`;
      list.appendChild(div);
    });
  }
  const form = document.getElementById('commentForm');
  if (currentUser) {
    const mySnap = await getDocs(query(collection(db,'restaurants',id,'comments'), where('uid','==',currentUser.uid)));
    const myComment = mySnap.empty ? null : mySnap.docs[0].data();
    form.innerHTML = `
      ${myComment?'<p style="font-size:12px;color:var(--gold);margin-bottom:6px">✏️ 이미 댓글을 남기셨어요. 수정 가능해요!</p>':''}
      <div class="star-row" id="modalStars">
        ${[1,2,3,4,5].map(i=>`<span class="star${myComment&&i<=myComment.rating?' on':''}" onclick="setRating(${i})">★</span>`).join('')}
        <span style="font-size:12px;color:var(--text3);margin-left:4px" id="ratingText">${myComment?myComment.rating+'점':'평점 선택'}</span>
      </div>
      <textarea id="commentText" placeholder="이 맛집에 대한 솔직한 후기를 남겨주세요...">${myComment?myComment.text:''}</textarea>
      <div class="comment-form-foot">
        <span style="font-size:12px;color:var(--text3)">댓글 작성 +3pt</span>
        <button class="btn-submit" onclick="submitComment()">${myComment?'수정':'등록'}</button>
      </div>`;

  } else {
    form.innerHTML = `<div style="text-align:center;padding:16px;color:var(--text3);font-size:13px">
      로그인 후 댓글을 남길 수 있어요

window.submitComment = async function() {
  const text = document.getElementById('commentText')?.value?.trim();
  if (!text) { showToast('댓글을 입력해주세요'); return; }
  if (!myRating) { showToast('평점을 선택해주세요'); return; }

  const existSnap = await getDocs(query(collection(db,'restaurants',currentCommentId,'comments'), where('uid','==',currentUser.uid)));
  const pts = currentUserData?.points || 0;

  if (!existSnap.empty) {
    await updateDoc(existSnap.docs[0].ref, {text, rating: myRating, updatedAt: serverTimestamp()});
    showToast('댓글 수정됐어요! ✏️');
  } else {
    await addDoc(collection(db,'restaurants',currentCommentId,'comments'), {
      text, rating: myRating,
      displayName: currentUser.displayName || '익명',
      photoURL: currentUser.photoURL || '',
      uid: currentUser.uid,
      userPoints: pts,
      createdAt: serverTimestamp()
    });
    // 댓글 작성 포인트
    await addPoints(currentUser.uid, 3, '댓글 작성');

    // 등록자에게 포인트
    const restSnap = await getDoc(doc(db,'restaurants',currentCommentId));
    const registeredBy = restSnap.data()?.registeredBy;
    if (registeredBy && registeredBy !== currentUser.uid) {
      const multiplier = getGradeMultiplier(pts);
      await addPoints(registeredBy, multiplier, `내 가게 댓글 (${getGrade(pts).name})`);
    }

    // 평균 평점 업데이트
    const allComments = await getDocs(collection(db,'restaurants',currentCommentId,'comments'));
    let total = 0, cnt = 0;
    allComments.forEach(c => { if(c.data().rating){total+=c.data().rating;cnt++;} });
    await updateDoc(doc(db,'restaurants',currentCommentId), {
      avgRating: cnt>0 ? Math.round((total/cnt)*10)/10 : 0,
      ratingCount: cnt
    });

    // 댓글 달성 보너스 체크
    if (cnt >= 20) {
      const restData = restSnap.data();
      if (!restData?.achievements?.comments20 && registeredBy) {
        await updateDoc(doc(db,'restaurants',currentCommentId), {'achievements.comments20': true});
        await addPoints(registeredBy, 20, '내 가게 댓글 20개 달성 보너스');
      }
    }

    showToast('댓글 등록됐어요! 🎉 +3pt');
  }
  await loadComments(currentCommentId);
  // 리스트 새로고침
  const d = DATA.find(x => x.id === currentCommentId);
  if (d) { d.avgRating = myRating; }
  renderList();
};

        <div class="my-points">총 <strong>${pts}</strong>pt 보유</div>
        <div class="my-stats">
          <div class="my-stat"><div class="my-stat-num">${myRests.length}</div><div class="my-stat-label">등록 맛집</div></div>
          <div class="my-stat"><div class="my-stat-num">${mySaved}</div><div class="my-stat-label">저장 맛집</div></div>
        </div>
      </div>
    </div>

    <!-- 등급 진행도 -->
    <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px">🥄 등급 현황</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        ${[{name:'스푼',icon:'🥄',min:0},{name:'은스푼',icon:'🥈',min:100},{name:'금스푼',icon:'🥇',min:300},{name:'별스푼',icon:'⭐',min:700}].map(g => `
          <div style="text-align:center;opacity:${pts>=g.min?1:0.4}">
            <div style="font-size:20px">${g.icon}</div>
            <div style="font-size:10px;font-weight:600;margin-top:2px">${g.name}</div>
            <div style="font-size:9px;color:var(--text3)">${g.min}pt~</div>
          </div>`).join('')}
      </div>
      <div style="background:var(--bg2);border-radius:4px;height:6px;overflow:hidden">
        <div style="background:var(--gold);height:100%;width:${Math.min(pts/700*100,100)}%;border-radius:4px;transition:width .5s"></div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px;text-align:right">${pts}/700pt (별스푼까지 ${Math.max(700-pts,0)}pt)</div>
    </div>

    <!-- 포인트 내역 -->
    <div class="point-history">
      <div class="point-history-title">💰 포인트 내역 (최근 10건)</div>
      ${pointHistory.slice(-10).reverse().map(p => `
        <div class="point-item">
          <span>${p.reason}</span>
          <span class="point-plus">+${p.points}pt</span>
        </div>`).join('') || '<p style="font-size:13px;color:var(--text3);text-align:center;padding:12px 0">아직 포인트 내역이 없어요</p>'}
    </div>

    <!-- 포인트 적립 안내 -->
    <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px">🎯 포인트 적립 방법</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
        <div style="background:var(--bg2);border-radius:8px;padding:10px">🍽️ 맛집 등록<br><strong style="color:var(--gold)">+10pt</strong></div>
        <div style="background:var(--bg2);border-radius:8px;padding:10px">🔗 링크 추가<br><strong style="color:var(--gold)">+5pt</strong></div>
        <div style="background:var(--bg2);border-radius:8px;padding:10px">💬 댓글 작성<br><strong style="color:var(--gold)">+3pt</strong></div>
        <div style="background:var(--bg2);border-radius:8px;padding:10px">⭐ 평점 주기<br><strong style="color:var(--gold)">+2pt</strong></div>
        <div style="background:var(--bg2);border-radius:8px;padding:10px">👥 저장 50명<br><strong style="color:var(--gold)">+30pt</strong></div>
        <div style="background:var(--bg2);border-radius:8px;padding:10px">💬 댓글 20개<br><strong style="color:var(--gold)">+20pt</strong></div>
      </div>
    </div>`;
}

// ── 페이지 전환 ──
window.setPage = function(page, el) {
  currentPage = page;
  document.querySelectorAll('.pnav').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('mainLayout').style.display = page==='main' ? 'flex' : 'none';
  document.getElementById('rankPage').classList.toggle('show', page==='rank');
  document.getElementById('myPage').classList.toggle('show', page==='my');
  if (page==='rank') renderRankPage();
  if (page==='my') renderMyPage();
};

window.setMapTab = function(tab, el) {
  document.querySelectorAll('.mtab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
};

window.setCat = function(el, cat) {
  selCat = cat;
  document.querySelectorAll('.cat').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  renderList(); renderPins();
};

window.setSort = function(sort) {
  selSort = sort;
  renderList();
};

window.doSearch = function(q) {
  searchQ = q.trim();
  renderList(); renderPins();
};

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
window.showToast = showToast;

// ── 초기화 ──
renderAuthArea();
renderCuratorList();
loadRests('성시경');
</script>
</body>
</html>
