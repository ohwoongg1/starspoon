<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starspoon — 연예인 맛집 지도</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=25b433faf5d746c938cbcc7658f650b0&libraries=services"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#F59E0B;
  --bg:#ffffff;--bg2:#F8F8F6;--bg3:#F1F0EC;
  --text:#1C1C1A;--text2:#6B6B67;--text3:#9B9B97;
  --border:#E4E3DF;--border2:#D0CFC9;
  --radius:10px;--radius-lg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px}

.header{background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.logo-icon{width:34px;height:34px;background:var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.logo-text span{color:var(--gold)}
.search-wrap{flex:1;max-width:500px;position:relative}
.search-wrap input{width:100%;height:38px;border-radius:19px;border:1.5px solid var(--border2);background:var(--bg2);padding:0 14px 0 40px;font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--gold);background:#fff}
.search-wrap input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:17px}
.header-btns{margin-left:auto;display:flex;gap:8px}
.hbtn{border:1.5px solid var(--border2);border-radius:8px;padding:6px 14px;font-size:13px;color:var(--text2);background:none;cursor:pointer;font-weight:500;transition:all .15s}
.hbtn:hover{background:var(--bg2)}
.hbtn.active{background:var(--gold);color:#fff;border-color:var(--gold)}

.filter-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.chip{border:1.5px solid var(--border2);border-radius:20px;padding:5px 15px;font-size:13px;color:var(--text2);background:var(--bg);cursor:pointer;white-space:nowrap;font-weight:500;transition:all .15s}
.chip:hover{border-color:var(--gold);color:var(--gold)}
.chip.on{background:var(--gold);border-color:var(--gold);color:#fff}

.main{display:flex;height:calc(100vh - 103px)}

.sidebar{width:360px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.celeb-tabs{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.ctab{border:1.5px solid var(--border2);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:500;color:var(--text2);background:none;cursor:pointer;white-space:nowrap;transition:all .15s}
.ctab:hover{border-color:var(--gold);color:var(--gold)}
.ctab.on{background:var(--gold);border-color:var(--gold);color:#fff}
.list-header{padding:10px 16px;font-size:12px;color:var(--text3);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.list-header strong{color:var(--text);font-weight:600}
.list{flex:1;overflow-y:auto}
.list::-webkit-scrollbar{width:4px}
.list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.card{padding:16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.card:hover,.card.active{background:var(--bg2)}
.card-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:10px}
.card-icon{width:38px;height:38px;flex-shrink:0;background:rgba(245,158,11,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.card-info{flex:1;min-width:0}
.card-name{font-weight:600;font-size:14px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.badge{background:rgba(245,158,11,0.12);color:#B45309;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:600}
.meta-dot{color:var(--border2)}
.meta-sub{font-size:12px;color:var(--text3)}
.comment{font-size:13px;color:var(--text2);line-height:1.55;padding:9px 11px;background:var(--bg2);border-radius:8px;border-left:2.5px solid var(--gold);margin-bottom:10px}
.card-foot{display:flex;align-items:center;gap:7px}
.yt-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#CC0000;background:rgba(204,0,0,0.06);border:1px solid rgba(204,0,0,0.18);border-radius:6px;padding:4px 9px;text-decoration:none;font-weight:500}
.yt-btn:hover{background:rgba(204,0,0,0.12)}
.map-btn{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);border:1px solid var(--border2);border-radius:6px;padding:4px 9px;background:none;cursor:pointer;font-weight:500}
.map-btn:hover{background:var(--bg2)}
.empty{padding:48px 20px;text-align:center;color:var(--text3)}
.empty i{font-size:32px;display:block;margin-bottom:10px;opacity:.4}

.map-area{flex:1;position:relative;overflow:hidden}
#kakao-map{width:100%;height:100%}

/* 커스텀 마커 말풍선 */
.custom-overlay{position:relative;background:var(--bg);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;min-width:180px;max-width:220px;box-shadow:0 6px 18px rgba(0,0,0,0.12);cursor:pointer}
.custom-overlay .tt-name{font-weight:600;font-size:14px;margin-bottom:2px;color:#1C1C1A}
.custom-overlay .tt-who{font-size:11px;color:#B45309;font-weight:600;margin-bottom:5px}
.custom-overlay .tt-comment{font-size:12px;color:#6B6B67;line-height:1.45}
.custom-overlay:after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-top-color:var(--border2);border-bottom:0}
.custom-overlay:before{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-top-color:#fff;border-bottom:0;z-index:1}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="index.html">
    <div class="logo-icon">🥄</div>
    <span class="logo-text">Star<span>spoon</span></span>
  </a>
  <div class="search-wrap">
    <i class="ti ti-search search-icon"></i>
    <input type="text" id="mainSearch" placeholder="연예인 이름 또는 음식 검색  예: 성시경 국밥" oninput="doSearch(this.value)">
  </div>
  <div class="header-btns">
    <button class="hbtn active">지도 보기</button>
    <button class="hbtn" onclick="location.href='admin.html'">관리자</button>
  </div>
</header>

<div class="filter-bar">
  <button class="chip on" onclick="setCategory(this,'전체')">전체</button>
  <button class="chip" onclick="setCategory(this,'국밥·탕')">국밥·탕</button>
  <button class="chip" onclick="setCategory(this,'한식')">한식</button>
  <button class="chip" onclick="setCategory(this,'냉면')">냉면</button>
  <button class="chip" onclick="setCategory(this,'고기')">고기</button>
  <button class="chip" onclick="setCategory(this,'중식')">중식</button>
  <button class="chip" onclick="setCategory(this,'일식')">일식</button>
  <button class="chip" onclick="setCategory(this,'분식')">분식</button>
  <button class="chip" onclick="setCategory(this,'카페·디저트')">카페·디저트</button>
</div>

<div class="main">
  <aside class="sidebar">
    <div class="celeb-tabs" id="celebTabs"></div>
    <div class="list-header">
      <span>맛집 목록</span>
      <strong id="listCount">0곳</strong>
    </div>
    <div class="list" id="restaurantList"></div>
  </aside>
  <main class="map-area">
    <div id="kakao-map"></div>
  </main>
</div>

<script>
// ── 데이터 ──────────────────────────────────
var DATA = [
  {id:1,name:"우래옥",celeb:"성시경",cat:"냉면",area:"중구",comment:"평양냉면의 정석. 면발이 살아있고 육수가 깊어요.",yt:"",lat:37.5663,lng:126.9997},
  {id:2,name:"하동관",celeb:"성시경",cat:"국밥·탕",area:"중구",comment:"50년 넘은 곰탕집. 국물 한 모금에 세월이 느껴짐.",yt:"",lat:37.5658,lng:126.9823},
  {id:3,name:"진주집",celeb:"성시경",cat:"한식",area:"종로구",comment:"청국장이 진짜입니다. 서울 한복판에 이런 맛이.",yt:"",lat:37.5779,lng:126.9850},
  {id:4,name:"을지OB베어",celeb:"이영자",cat:"한식",area:"중구",comment:"안주도 훌륭하고 분위기가 옛날 감성 그대로예요.",yt:"",lat:37.5660,lng:126.9874},
  {id:5,name:"장충동왕족발",celeb:"이영자",cat:"한식",area:"중구",comment:"족발은 여기가 원조. 쫄깃함이 달라요.",yt:"",lat:37.5590,lng:127.0050},
  {id:6,name:"명동교자",celeb:"백종원",cat:"한식",area:"중구",comment:"칼국수 면이 특별해요. 이 가격에 이 퀄리티.",yt:"",lat:37.5635,lng:126.9856},
  {id:7,name:"삼청동수제비",celeb:"나얼",cat:"한식",area:"종로구",comment:"수제비 한 그릇에 감성까지 담겨있어요.",yt:"",lat:37.5823,lng:126.9810},
  {id:8,name:"봉피양",celeb:"나얼",cat:"냉면",area:"서초구",comment:"평양냉면 좋아하면 꼭 가봐야 할 곳.",yt:"",lat:37.5040,lng:127.0243},
  {id:9,name:"홍대양꼬치",celeb:"홍진경",cat:"고기",area:"마포구",comment:"양꼬치는 여기 와야 제대로 먹는 거예요.",yt:"",lat:37.5563,lng:126.9233},
  {id:10,name:"연남동카페그날",celeb:"홍진경",cat:"카페·디저트",area:"마포구",comment:"디저트가 예쁘고 맛도 있어요. 사진각도 완벽!",yt:"",lat:37.5602,lng:126.9246},
  {id:11,name:"광장시장마약김밥",celeb:"성시경",cat:"분식",area:"종로구",comment:"마약김밥 한 줄이면 점심 해결. 가성비 끝판왕.",yt:"",lat:37.5700,lng:126.9994},
  {id:12,name:"경리단갈비",celeb:"백종원",cat:"고기",area:"용산구",comment:"갈비 맛은 여기가 진짜. 숯불향이 달라요.",yt:"",lat:37.5346,lng:126.9947},
];

var COLORS={
  "성시경":"#F59E0B","이영자":"#EF4444",
  "백종원":"#3B82F6","나얼":"#8B5CF6","홍진경":"#10B981"
};

var selCeleb="전체", selCat="전체", searchQ="";
var map, markers=[], overlays=[], geocoder;

// ── 카카오맵 초기화 ──────────────────────────
kakao.maps.load(function(){
  var container = document.getElementById("kakao-map");
  var options = {
    center: new kakao.maps.LatLng(37.5550, 126.9700),
    level: 8
  };
  map = new kakao.maps.Map(container, options);
  geocoder = new kakao.maps.services.Geocoder();

  // 지도 컨트롤 추가
  var zoomControl = new kakao.maps.ZoomControl();
  map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);
  var mapTypeControl = new kakao.maps.MapTypeControl();
  map.addControl(mapTypeControl, kakao.maps.ControlPosition.TOPRIGHT);

  buildCelebTabs();
  render();
});

// ── 마커 생성 ──────────────────────────────
function makeMarkerImage(color){
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="42" viewBox="0 0 36 42">'
    +'<path d="M18 0C8.06 0 0 8.06 0 18c0 12.75 18 24 18 24S36 30.75 36 18C36 8.06 27.94 0 18 0z" fill="'+color+'"/>'
    +'<text x="18" y="23" text-anchor="middle" font-size="16">⭐</text>'
    +'</svg>';
  var url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  return new kakao.maps.MarkerImage(url, new kakao.maps.Size(36,42), {offset: new kakao.maps.Point(18,42)});
}

function renderPins(){
  // 기존 마커 제거
  markers.forEach(function(m){m.setMap(null)});
  overlays.forEach(function(o){o.setMap(null)});
  markers=[]; overlays=[];

  var items = filtered();
  items.forEach(function(d){
    var color = COLORS[d.celeb] || "#F59E0B";
    var pos = new kakao.maps.LatLng(d.lat, d.lng);
    var marker = new kakao.maps.Marker({
      map: map,
      position: pos,
      image: makeMarkerImage(color),
      title: d.name
    });

    // 말풍선 오버레이
    var content = '<div class="custom-overlay">'
      +'<div class="tt-name">'+d.name+'</div>'
      +'<div class="tt-who">⭐ '+d.celeb+' 추천</div>'
      +'<div class="tt-comment">'+d.comment+'</div>'
      +'</div>';
    var overlay = new kakao.maps.CustomOverlay({
      position: pos,
      content: content,
      yAnchor: 2.2,
      zIndex: 3
    });

    kakao.maps.event.addListener(marker,'mouseover',function(){overlay.setMap(map)});
    kakao.maps.event.addListener(marker,'mouseout',function(){overlay.setMap(null)});
    kakao.maps.event.addListener(marker,'click',function(){
      map.setCenter(pos);
      map.setLevel(4);
    });

    markers.push(marker);
    overlays.push(overlay);
  });
}

// ── 리스트 렌더 ──────────────────────────────
function renderList(){
  var list = document.getElementById("restaurantList");
  var items = filtered();
  document.getElementById("listCount").textContent = items.length+"곳";
  if(items.length===0){
    list.innerHTML='<div class="empty"><i class="ti ti-mood-empty"></i>검색 결과가 없어요</div>';
    return;
  }
  list.innerHTML = items.map(function(d){
    return '<div class="card" onclick="focusMap('+d.id+')">'
      +'<div class="card-top">'
        +'<div class="card-icon">⭐</div>'
        +'<div class="card-info">'
          +'<div class="card-name">'+d.name+'</div>'
          +'<div class="card-meta">'
            +'<span class="badge">'+d.celeb+'</span>'
            +'<span class="meta-dot">·</span>'
            +'<span class="meta-sub">'+d.cat+'</span>'
            +'<span class="meta-dot">·</span>'
            +'<span class="meta-sub">'+d.area+'</span>'
          +'</div>'
        +'</div>'
      +'</div>'
      +'<div class="comment">"'+d.comment+'"</div>'
      +'<div class="card-foot">'
        +(d.yt?'<a class="yt-btn" href="'+d.yt+'" target="_blank"><i class="ti ti-brand-youtube"></i>영상 보기</a>':'<span style="font-size:12px;color:var(--text3)">영상 미등록</span>')
        +'<button class="map-btn" onclick="event.stopPropagation();focusMap('+d.id+')"><i class="ti ti-map-pin"></i>지도</button>'
      +'</div>'
    +'</div>';
  }).join("");
}

function focusMap(id){
  var d = DATA.find(function(x){return x.id===id});
  if(!d||!map) return;
  map.setCenter(new kakao.maps.LatLng(d.lat, d.lng));
  map.setLevel(4);
  document.querySelectorAll(".card").forEach(function(c){c.classList.remove("active")});
  event.currentTarget.classList.add("active");
}

function buildCelebTabs(){
  var celebs = ["전체",...new Set(DATA.map(function(d){return d.celeb}))];
  var container = document.getElementById("celebTabs");
  container.innerHTML = "";
  celebs.forEach(function(c){
    var btn = document.createElement("button");
    btn.className = "ctab"+(c==="전체"?" on":"");
    btn.textContent = c;
    btn.onclick = function(){setCeleb(this,c)};
    container.appendChild(btn);
  });
}

function filtered(){
  return DATA.filter(function(d){
    if(selCeleb!=="전체"&&d.celeb!==selCeleb) return false;
    if(selCat!=="전체"&&d.cat!==selCat) return false;
    if(searchQ){
      if(d.celeb.indexOf(searchQ)<0&&d.name.indexOf(searchQ)<0&&
         d.cat.indexOf(searchQ)<0&&d.comment.indexOf(searchQ)<0) return false;
    }
    return true;
  });
}

function render(){renderList();if(map)renderPins();}
function setCeleb(el,name){
  document.querySelectorAll(".ctab").forEach(function(b){b.classList.remove("on")});
  el.classList.add("on"); selCeleb=name; render();
}
function setCategory(el,cat){
  document.querySelectorAll(".chip").forEach(function(b){b.classList.remove("on")});
  el.classList.add("on"); selCat=cat; render();
}
function doSearch(q){searchQ=q.trim(); render();}
</script>
</body>
</html>
