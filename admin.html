<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starspoon 관리자</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#F59E0B;--bg:#ffffff;--bg2:#F8F8F6;--bg3:#F1F0EC;--text:#1C1C1A;--text2:#6B6B67;--text3:#9B9B97;--border:#E4E3DF;--border2:#D0CFC9;--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px}

.header{background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:600;text-decoration:none;color:var(--text)}
.logo-icon{width:30px;height:30px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.badge-adm{font-size:11px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:2px 9px;color:var(--text2);font-weight:500}
.back-btn{font-size:13px;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:5px;border:1px solid var(--border2);border-radius:8px;padding:5px 13px}
.back-btn:hover{background:var(--bg2)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.stat-label{font-size:12px;color:var(--text3);margin-bottom:5px}
.stat-val{font-size:24px;font-weight:700;color:var(--text)}

.body{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px 20px}
.panel{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius)}
.panel-full{grid-column:1/-1}
.ph{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ph-title{font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;color:var(--text)}
.ph-badge{font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 8px;color:var(--text2)}
.pb{padding:18px}

.fg{margin-bottom:13px}
.fl{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;border-radius:8px;border:1.5px solid var(--border2);background:var(--bg2);padding:9px 11px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);background:#fff}
.fg textarea{resize:vertical;min-height:64px;line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-add{width:100%;background:var(--gold);color:#fff;border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:2px;transition:background .15s}
.btn-add:hover{background:#D97706}
.btn-add:active{transform:scale(.98)}

.celeb-list{display:flex;flex-direction:column;gap:6px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.cl-label{font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:500}
.ci{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg2)}
.ci-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ci-name{font-size:13px;font-weight:600;flex:1}
.ci-cnt{font-size:12px;color:var(--text3)}
.ci-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px;line-height:1;display:flex}
.ci-del:hover{color:#EF4444}

.search-row{position:relative;margin-bottom:14px}
.search-row input{width:100%;padding-left:36px}
.search-row .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--text3)}

table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text3);font-weight:600;font-size:12px}
tbody td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg2)}
.td-badge{display:inline-block;background:rgba(245,158,11,0.1);color:#B45309;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:600}
.td-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;display:flex;align-items:center}
.td-del:hover{color:#EF4444}
.empty-row td{text-align:center;padding:24px;color:var(--text3)}

.toast{position:fixed;bottom:22px;right:22px;background:#1C1C1A;color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;display:none;align-items:center;gap:8px;z-index:999;box-shadow:0 6px 16px rgba(0,0,0,0.2);animation:slideUp .2s ease}
.toast.show{display:flex}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">🥄</div>
    Starspoon
    <span class="badge-adm">관리자</span>
  </div>
  <a class="back-btn" href="index.html"><i class="ti ti-arrow-left"></i>사이트로 돌아가기</a>
</header>

<div class="stats">
  <div class="stat"><div class="stat-label">등록 연예인</div><div class="stat-val" id="s-celeb">0</div></div>
  <div class="stat"><div class="stat-label">등록 맛집</div><div class="stat-val" id="s-rest">0</div></div>
  <div class="stat"><div class="stat-label">카테고리</div><div class="stat-val" id="s-cat">8</div></div>
  <div class="stat"><div class="stat-label">오늘 추가</div><div class="stat-val" id="s-today">0</div></div>
</div>

<div class="body">

  <!-- 연예인 추가 -->
  <div class="panel">
    <div class="ph"><div class="ph-title"><i class="ti ti-user-star"></i>연예인 추가</div></div>
    <div class="pb">
      <div class="fg"><label class="fl">연예인 이름</label><input type="text" id="c-name" placeholder="예: 유재석"></div>
      <div class="fg"><label class="fl">유튜브 채널명</label><input type="text" id="c-yt" placeholder="예: 유재석의 뭔가"></div>
      <div class="fg">
        <label class="fl">핀 색상</label>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="color" id="c-color" value="#6366F1" style="width:46px;height:38px;padding:3px;cursor:pointer;border-radius:8px;border:1.5px solid var(--border2);background:none">
          <span style="font-size:12px;color:var(--text3)">지도에 표시되는 핀 색상</span>
        </div>
      </div>
      <button class="btn-add" onclick="addCeleb()"><i class="ti ti-plus"></i>연예인 추가</button>
      <div class="celeb-list">
        <div class="cl-label">등록된 연예인</div>
        <div id="celeb-list"></div>
      </div>
    </div>
  </div>

  <!-- 맛집 추가 -->
  <div class="panel">
    <div class="ph"><div class="ph-title"><i class="ti ti-map-pin"></i>맛집 추가</div></div>
    <div class="pb">
      <div class="frow">
        <div class="fg"><label class="fl">맛집 이름</label><input type="text" id="r-name" placeholder="예: 우래옥"></div>
        <div class="fg"><label class="fl">연예인</label><select id="r-celeb"></select></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">카테고리</label>
          <select id="r-cat">
            <option>국밥·탕</option><option>한식</option><option>냉면</option>
            <option>고기</option><option>중식</option><option>일식</option>
            <option>분식</option><option>카페·디저트</option>
          </select>
        </div>
        <div class="fg"><label class="fl">지역</label><input type="text" id="r-area" placeholder="예: 중구, 마포구"></div>
      </div>
      <div class="fg"><label class="fl">유튜브 영상 URL</label><input type="text" id="r-yt" placeholder="https://youtube.com/watch?v=..."></div>
      <div class="fg"><label class="fl">연예인 코멘트 요약</label><textarea id="r-comment" placeholder="예: 면발이 쫄깃하고 육수가 깊어요. 꼭 가봐야 할 곳."></textarea></div>
      <button class="btn-add" onclick="addRestaurant()"><i class="ti ti-plus"></i>맛집 추가</button>
    </div>
  </div>

  <!-- 목록 -->
  <div class="panel panel-full">
    <div class="ph">
      <div class="ph-title"><i class="ti ti-list"></i>등록된 맛집 목록</div>
      <span class="ph-badge" id="rest-badge">0곳</span>
    </div>
    <div class="pb">
      <div class="search-row">
        <i class="ti ti-search si"></i>
        <input type="text" placeholder="이름, 연예인, 카테고리 검색..." oninput="renderTable(this.value)">
      </div>
      <table>
        <thead><tr><th>맛집 이름</th><th>연예인</th><th>카테고리</th><th>지역</th><th>코멘트</th><th></th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toast-msg"></span></div>

<script>
var COLORS=["#F59E0B","#EF4444","#3B82F6","#8B5CF6","#10B981","#EC4899","#F97316","#14B8A6"];
var celebs=[
  {name:"성시경",yt:"먹을텐데",color:"#F59E0B"},
  {name:"이영자",yt:"이영자TV",color:"#EF4444"},
  {name:"백종원",yt:"백종원의 요리비책",color:"#3B82F6"},
  {name:"나얼",yt:"나얼TV",color:"#8B5CF6"},
  {name:"홍진경",yt:"홍진경의 여난",color:"#10B981"},
];
var restaurants=[
  {id:1,name:"우래옥",celeb:"성시경",cat:"냉면",area:"중구",comment:"평양냉면의 정석. 면발이 살아있고 육수가 깊어요.",yt:""},
  {id:2,name:"하동관",celeb:"성시경",cat:"국밥·탕",area:"중구",comment:"50년 넘은 곰탕집. 국물 한 모금에 세월이 느껴짐.",yt:""},
  {id:3,name:"진주집",celeb:"성시경",cat:"한식",area:"종로구",comment:"청국장이 진짜입니다.",yt:""},
  {id:4,name:"을지OB베어",celeb:"이영자",cat:"한식",area:"중구",comment:"안주도 훌륭하고 분위기가 옛날 감성 그대로예요.",yt:""},
  {id:5,name:"장충동왕족발",celeb:"이영자",cat:"한식",area:"중구",comment:"족발은 여기가 원조.",yt:""},
  {id:6,name:"명동교자",celeb:"백종원",cat:"한식",area:"중구",comment:"칼국수 면이 특별해요.",yt:""},
  {id:7,name:"삼청동수제비",celeb:"나얼",cat:"한식",area:"종로구",comment:"수제비 한 그릇에 감성까지 담겨있어요.",yt:""},
  {id:8,name:"봉피양",celeb:"나얼",cat:"냉면",area:"서초구",comment:"평양냉면 좋아하면 꼭 가봐야.",yt:""},
  {id:9,name:"홍대양꼬치",celeb:"홍진경",cat:"고기",area:"마포구",comment:"양꼬치는 여기 와야 제대로.",yt:""},
  {id:10,name:"연남동카페그날",celeb:"홍진경",cat:"카페·디저트",area:"마포구",comment:"디저트가 예쁘고 맛도 있어요.",yt:""},
  {id:11,name:"광장시장마약김밥",celeb:"성시경",cat:"분식",area:"종로구",comment:"가성비 끝판왕.",yt:""},
  {id:12,name:"경리단갈비",celeb:"백종원",cat:"고기",area:"용산구",comment:"갈비 맛은 여기가 진짜.",yt:""},
];
var todayCount=0,nextId=13;

function toast(msg){
  var t=document.getElementById("toast");
  document.getElementById("toast-msg").textContent=msg;
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show")},2200);
}
function updateStats(){
  document.getElementById("s-celeb").textContent=celebs.length;
  document.getElementById("s-rest").textContent=restaurants.length;
  document.getElementById("s-today").textContent=todayCount;
  document.getElementById("rest-badge").textContent=restaurants.length+"곳";
}
function renderCelebList(){
  var el=document.getElementById("celeb-list");
  el.innerHTML=celebs.map(function(c){
    var cnt=restaurants.filter(function(r){return r.celeb===c.name}).length;
    return '<div class="ci">'+
      '<div class="ci-dot" style="background:'+c.color+'"></div>'+
      '<div class="ci-name">'+c.name+'</div>'+
      '<div class="ci-cnt">'+cnt+'곳</div>'+
      '<button class="ci-del" onclick="delCeleb(\''+c.name+'\')"><i class="ti ti-x"></i></button>'+
    '</div>';
  }).join("");
  var sel=document.getElementById("r-celeb");
  sel.innerHTML=celebs.map(function(c){
    return '<option value="'+c.name+'">'+c.name+'</option>';
  }).join("");
}
function renderTable(q){
  var q2=(q||"").toLowerCase();
  var list=restaurants.filter(function(r){
    return !q2||(r.name+r.celeb+r.cat+r.area+r.comment).toLowerCase().indexOf(q2)>=0;
  });
  var tbody=document.getElementById("tbody");
  if(list.length===0){
    tbody.innerHTML='<tr class="empty-row"><td colspan="6">검색 결과가 없어요</td></tr>';return;
  }
  tbody.innerHTML=list.map(function(r){
    return '<tr>'+
      '<td style="font-weight:600">'+r.name+'</td>'+
      '<td><span class="td-badge">'+r.celeb+'</span></td>'+
      '<td>'+r.cat+'</td>'+
      '<td style="color:var(--text2)">'+r.area+'</td>'+
      '<td style="color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.comment+'</td>'+
      '<td><button class="td-del" onclick="delRest('+r.id+')"><i class="ti ti-trash"></i></button></td>'+
    '</tr>';
  }).join("");
}
function addCeleb(){
  var name=document.getElementById("c-name").value.trim();
  var yt=document.getElementById("c-yt").value.trim();
  var color=document.getElementById("c-color").value;
  if(!name){toast("이름을 입력해주세요");return;}
  if(celebs.find(function(c){return c.name===name})){toast("이미 등록된 연예인");return;}
  celebs.push({name:name,yt:yt,color:color});
  document.getElementById("c-name").value="";
  document.getElementById("c-yt").value="";
  todayCount++;renderCelebList();updateStats();toast(name+" 추가 완료!");
}
function delCeleb(name){
  if(restaurants.some(function(r){return r.celeb===name})){toast("맛집이 있어서 삭제 불가");return;}
  celebs=celebs.filter(function(c){return c.name!==name});
  renderCelebList();updateStats();toast(name+" 삭제 완료");
}
function addRestaurant(){
  var name=document.getElementById("r-name").value.trim();
  var celeb=document.getElementById("r-celeb").value;
  var cat=document.getElementById("r-cat").value;
  var area=document.getElementById("r-area").value.trim();
  var yt=document.getElementById("r-yt").value.trim();
  var comment=document.getElementById("r-comment").value.trim();
  if(!name||!area||!comment){toast("이름, 지역, 코멘트는 필수예요");return;}
  restaurants.push({id:nextId++,name:name,celeb:celeb,cat:cat,area:area,yt:yt,comment:comment});
  document.getElementById("r-name").value="";
  document.getElementById("r-area").value="";
  document.getElementById("r-yt").value="";
  document.getElementById("r-comment").value="";
  todayCount++;renderCelebList();renderTable();updateStats();toast(name+" 추가 완료!");
}
function delRest(id){
  restaurants=restaurants.filter(function(r){return r.id!==id});
  renderCelebList();renderTable();updateStats();toast("맛집 삭제 완료");
}
renderCelebList();renderTable();updateStats();
</script>
</body>
</html>
